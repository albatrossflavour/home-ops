                    var count = groups[date].length;

                    var btn = document.createElement('button');
                    btn.textContent = label + ' \u00b7 ' + count;
                    btn.setAttribute('data-date', date);
                    filterBar.appendChild(btn);

                    var opt = document.createElement('option');
                    opt.value = date;
                    opt.textContent = label + ' \u2014 ' + count + ' events';
                    filterSelect.appendChild(opt);
                });

                filterToDate = function(selectedDate) {
                    var dateGroups = container.querySelectorAll('.date-group');
                    dateGroups.forEach(function(g) {
                        var show = selectedDate === 'all' || g.getAttribute('data-date') === selectedDate;
                        g.style.display = show ? '' : 'none';
                        if (show) { activateVideos(g); } else { deactivateVideos(g); }
                    });
                    filterBar.querySelectorAll('button').forEach(function(b) {
                        b.classList.toggle('active', b.getAttribute('data-date') === selectedDate);
                    });
                    filterSelect.value = selectedDate;
                };

                filterBar.addEventListener('click', function(e) {
                    if (e.target.tagName !== 'BUTTON') return;
                    filterToDate(e.target.getAttribute('data-date'));
                });

                filterSelect.addEventListener('change', function() {
                    filterToDate(this.value);
                });
            }

            dates.forEach(function(date) {
                var group = document.createElement('div');
                group.className = 'date-group';
                group.setAttribute('data-date', date);

                var parts = date.split('-');
                var d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                var heading = document.createElement('h2');
                heading.textContent = d.toLocaleDateString('en-AU', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC'
                });
                group.appendChild(heading);

                var grid = document.createElement('div');
                grid.className = 'events-grid';

                groups[date].forEach(function(ev) {
                    var eventId = ev.id != null ? ev.id : ev.timestamp.replace(/[^0-9]/g, '');
                    var card = document.createElement('div');
                    card.className = 'event-card';
                    card.id = 'event-' + eventId;

                    var badgeClass = 'badge-' + ev.type;
                    var ts = new Date(ev.timestamp);
                    var timeStr = ts.toLocaleTimeString('en-AU', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: TIMEZONE
                    });
                    var displayName = DISPLAY_NAMES[ev.type] || ev.type;

                    var noStats = {MANUAL_CAPTURE: 1, BOOT: 1};
                    var statsHtml = '';
                    if (!noStats[ev.type]) {
                        if (ev.speed_kmh !== undefined && ev.speed_kmh > 0) {
                            statsHtml += '<span>Speed: <strong>' + Math.round(ev.speed_kmh) + ' km/h</strong></span>';
                        }
                        if (ev.peak_g !== undefined && ev.peak_g > 0) {
                            statsHtml += '<span>Peak: <strong>' + ev.peak_g.toFixed(2) + ' g</strong></span>';
                        }
                    }

                    var videoHtml = '';
                    var videoSrc = _eventVideoUrl(ev);
                    var posterUrl = ev.poster_url || '/captures/intro_poster.jpg';
                    var actionsHtml = '<div class="event-actions">';
                    if (videoSrc) {
                        videoHtml = '<div class="event-video-placeholder" data-video-src="' + videoSrc + '" data-poster-url="' + posterUrl + '"></div>';
                        actionsHtml += '<a href="#" class="share-btn" data-share-url="' + videoSrc + '">Share</a>';
                        actionsHtml += '<a href="' + videoSrc + '" download>Download</a>';
                    }
                    var telemetryUrl = _eventTelemetryUrl(ev);
                    if (telemetryUrl) {
                        actionsHtml += '<a href="' + telemetryUrl + '" target="_blank" rel="noopener">Telemetry &rarr;</a>';
                    }
                    actionsHtml += '</div>';

                    card.innerHTML =
                        '<div class="event-header">' +
                        '<span class="badge ' + badgeClass + '">' + displayName + '</span>' +
                        '<span class="event-time">' + timeStr + '</span>' +
                        '</div>' +
                        (statsHtml ? '<div class="event-stats">' + statsHtml + '</div>' : '') +
                        '<div class="event-media">' + videoHtml + actionsHtml + '</div>';

                    grid.appendChild(card);
                });

                group.appendChild(grid);
                container.appendChild(group);
            });

            if (dates.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:3rem;color:#8b949e;">No events recorded yet.</p>';
            } else if (filterToDate) {
                filterToDate(dates[0]);
            } else {
                container.querySelectorAll('.date-group').forEach(activateVideos);
            }

            container.addEventListener('click', function(e) {
                var btn = e.target.closest('.share-btn');
                if (!btn) return;
                e.preventDefault();
                var url = _absoluteUrl(btn.getAttribute('data-share-url'));
                navigator.clipboard.writeText(url).then(function() {
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = 'Share'; }, 2000);
                });
            });

            container.addEventListener('click', function(e) {
                var ph = e.target.closest('.event-video-placeholder');
                if (!ph) return;
                var v = swapToVideo(ph);
                if (v) {
                    var p = v.play();
                    if (p && typeof p.catch === 'function') { p.catch(function() {}); }
                }
            });

            var params = new URLSearchParams(window.location.search);
            var targetId = params.get('event');
            if (targetId) {
                var el = document.getElementById('event-' + targetId);
                if (el) {
                    // The default filter shows only the most recent day, so a shared
                    // event from an earlier day sits in a display:none group and
                    // scrollIntoView is a no-op. Switch the filter to its day first.
                    if (filterToDate) {
                        var grp = el.closest('.date-group');
                        if (grp) filterToDate(grp.getAttribute('data-date'));
                    }
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('highlighted');
                }
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // Re-run mode detection on tab focus return (D-04)
                var pathname = window.location.pathname;
                if (pathname === '/' || pathname === '/index.html') {
                    renderHomepage();
                }
            }
        });

        var eventsData = null;
        var notesData = null;
        var fuelData = null;
        var breakdownsData = null;
        var driverStatsData = null;
        var agendaData = null;
        var routeData = null;
        var _currentDayMap = null;
        var _countdownTimer = null;
        // Load data sources for SPA router consumption. events.json is gated into the
        // router barrier below so route() never dispatches (and pages like /videos
        // never early-return on empty data) before the events are in memory.
        var eventsReady = fetch('/captures/events.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(events) {
                if (events) {
                    eventsData = _usableEvents(events);
                }
            })
            .catch(function() {});

        fetch('/captures/notes.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(notes) { if (notes) notesData = notes.slice().reverse(); })
            .catch(function() {});

        fetch('/captures/fuel.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(fuel) { if (fuel) fuelData = fuel; })
            .catch(function() {});

        fetch('/captures/breakdowns.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(bd) { if (bd) breakdownsData = bd; })
            .catch(function() {});

        fetch('/captures/driver-stats.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) driverStatsData = data; })
            .catch(function() {});

        // Wait for events + agenda + route to settle (success or fail), then run the SPA
        // router. Gating on events.json means a deep-linked page (e.g. /videos?event=)
        // has its data ready on first dispatch instead of racing the fetch and losing.
        // The other fetches keep resolving independently into renderEvents/renderNotes/etc.
        Promise.allSettled([
            eventsReady,
            fetch('/agenda.json', { cache: 'no-cache' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(x) { agendaData = x || agendaData; })
                .catch(function(err) { console.warn('agenda fetch failed', err); }),
            fetch('/captures/route.json', { cache: 'no-cache' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(x) { routeData = x || routeData; })
                .catch(function(err) { console.warn('route fetch failed', err); })
        ]).then(function() { route(); });

        window.navigateToDay = navigateToDay;
        window.navigateHome = navigateHome;
        window.navigateToCar = navigateToCar;
        window.navigateToAbout = navigateToAbout;

    })();
    </script>
</body>
</html>
