                            '<div class="build-desc">3D-printed PETG ceiling mount. Parametric OpenSCAD design, 4\u00d72 grid. Keeps the sensors tidy and moderately vibration-proof.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Apr 2026</div>' +
                            '<div class="build-title">GPIO Bench Fit-out</div>' +
                            '<div class="build-desc">GPS module, big red button, and piezo buzzer wired to the V2 Pi 5. Soldered connections this time, not breadboard jumpers.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Mar 2026</div>' +
                            '<div class="build-title">Dual-Camera PiP</div>' +
                            '<div class="build-desc">Front + cabin cameras composited in real-time by a single ffmpeg process. 10fps, ~7MB segments, stable at ~44% CPU on one core.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Mar 2026</div>' +
                            '<div class="build-title">Timelapse System</div>' +
                            '<div class="build-desc">One frame every 10 seconds while moving. Compiled daily into a 24fps video with intro card. Concat demuxer, ultrafast preset, under 30 seconds to compile.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Mar 2026</div>' +
                            '<div class="build-title">ffmpeg Stability</div>' +
                            '<div class="build-desc">Found and fixed the 2.5-minute stall bug: stderr pipe buffer filling up and blocking ffmpeg. Health monitor now drains it every 2 seconds. Boring fix, massive improvement.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Early 2026</div>' +
                            '<div class="build-title">V1 Telemetry</div>' +
                            '<div class="build-desc">Original build: Pi 4, MPU-6050, single USB camera, BME680, INA219, OLED display. Event detection, ring buffer capture, offline-first SQLite, Prometheus sync over WireGuard. The foundation everything else grew from.</div>' +
                        '</div>' +
                    '</div>' +
                '</section>';

            var photosHtml =
                '<section class="about-card" id="car-build-photos">' +
                    '<h3>Build Photos</h3>' +
                    '<div class="car-gallery">' +
                        '<img src="/car-interior.jpg" alt="Dashboard with Pi and display" onerror="this.style.display=\'none\'; window._carPhotoFail=(window._carPhotoFail||0)+1; if(window._carPhotoFail>=3)document.getElementById(\'car-build-photos\').style.display=\'none\';">' +
                        '<img src="/car-sensor-cluster.jpg" alt="Ceiling-mounted sensor cluster" onerror="this.style.display=\'none\'; window._carPhotoFail=(window._carPhotoFail||0)+1; if(window._carPhotoFail>=3)document.getElementById(\'car-build-photos\').style.display=\'none\';">' +
                        '<img src="/car-engine-bay.jpg" alt="Engine bay" onerror="this.style.display=\'none\'; window._carPhotoFail=(window._carPhotoFail||0)+1; if(window._carPhotoFail>=3)document.getElementById(\'car-build-photos\').style.display=\'none\';">' +
                    '</div>' +
                '</section>';

            var html = '<div class="day-page">' +
                carIntro +
                whyHtml +
                telemetryHtml +
                buildHtml +
                photosHtml +
                hardwareHtml +
                softwareHtml +
                '<section><a href="/" onclick="event.preventDefault(); navigateHome();" style="color:#c06000;">\u2190 Home</a></section>' +
            '</div>';
            window._carPhotoFail = 0;
            showRoute(html);
        }

        function _driverStatsLine(name, ds) {
            if (!ds || !ds.drivers) return '';
            var match = null;
            ds.drivers.forEach(function(d) {
                if (d.driver_name && d.driver_name.toLowerCase() === name.toLowerCase()) match = d;
            });
            if (!match) return '';
            var time = _formatDriveTimeLocal(match.total_seconds || 0);
            var pct = (match.pct != null) ? Number(match.pct).toFixed(1) : '0';
            var isActive = ds.active_driver && match.driver_name === ds.active_driver;
            return '<div class="member-role" style="margin-top:-0.25rem;">' +
                escapeHtml(time) + ' on the wheel (' + escapeHtml(pct) + '%)' +
                (isActive ? ' <span style="color:#f0dbb8;font-weight:600;"> On Duty</span>' : '') +
            '</div>';
        }

        function renderAbout() {
            _teardownDayMap();
            _stopCountdown();
            _stopLiveRefresh();
            renderDayNav(agendaData, null);

            var steveStats = _driverStatsLine('Steve', driverStatsData);
            var tonyStats = _driverStatsLine('Tony', driverStatsData);

            var teamHtml =
                '<section class="about-card">' +
                    '<h3>The Team</h3>' +
                    '<div class="team-grid">' +
                        '<div class="team-member">' +
                            '<div class="member-avatar">S</div>' +
                            '<h4>Steve</h4>' +
                            '<div class="member-role">CFO, Chief Fermentation Officer</div>' +
                            steveStats +
                            '<p>I\'m here to raise money for cancer research.</p>' +
                            '<p>I\'m also here because pointing a $1,500 car at the horizon and seeing what happens feels like exactly the right kind of stupid.</p>' +
                            '<p>By day I\'m a program manager, which mostly means I deal with budgets, timelines and logistics. So for this rally I\'m keeping an eye on the money, the planning and making sure we don\'t forget something important 800 kilometres back up the road.</p>' +
                            '<p>I\'m also in charge of the music and the beer. If the playlist\'s good and morale\'s high, I\'m doing my job.</p>' +
                            '<p>Tony bolts sensors to things and worries about graphs. I make sure we\'ve got fuel, a plan, and something decent playing when the car starts making noises it shouldn\'t.</p>' +
                            '<p>We\'re aiming to get from Port Douglas to Melbourne, raise as much as we can, and come back with a few stories worth telling.</p>' +
                            '<p>We\'re aiming to raise as much as we can for cancer research along the way.</p>' +
                        '</div>' +
                        '<div class="team-member">' +
                            '<img class="member-avatar-img" src="https://www.gravatar.com/avatar/4fce033d079d9cb954f6ac0f2117523f?s=160" alt="Tony">' +
                            '<h4>Tony</h4>' +
                            '<div class="member-role">CTO, Chief Telemetry Overbuilder</div>' +
                            tonyStats +
                            '<p>I build systems for a living. Normally they sit in racks and behave themselves. This one is bolted to the dashboard of a 2001 Ford Laser and will almost certainly try to kill us.</p>' +
                            '<p>I built the telemetry because:</p>' +
                            '<ul>' +
                                '<li>The car can\'t be trusted</li>' +
                                '<li>Data makes me feel less helpless</li>' +
                                '<li>If something breaks, it should at least leave a dataset</li>' +
                                '<li>I know nothing about cars and needed to contribute somehow</li>' +
                            '</ul>' +
                            '<p>My dad died of cancer in 2011.</p>' +
                            '<p>My mum is living with terminal cancer now.</p>' +
                            '<p>At some point cancer stops being an abstract "1 in 2" and becomes hospital corridors, phone calls, and dates you don\'t forget.</p>' +
                            '<p>This rally is something I can do. It\'s not a fix. It\'s not a cure. It\'s just action.</p>' +
                            '<p>If you\'re entertained by a $1,500 car running better monitoring than some enterprise environments, that\'s the spirit.</p>' +
                        '</div>' +
                    '</div>' +
                '</section>';

            var html = '<div class="day-page">' +
                teamHtml +
                '<section><a href="/" onclick="event.preventDefault(); navigateHome();" style="color:#c06000;">\u2190 Home</a></section>' +
            '</div>';
            showRoute(html);
        }

        function renderLegacyVideos() {
            _teardownDayMap();
            _stopCountdown();
            _stopLiveRefresh();

            var containerHtml =
                '<div class="day-page">' +
                    '<section class="day-header"><h1 style="color:#f0dbb8;">Videos</h1></section>' +
                    '<div id="legacy-rally-progress" class="rally-progress" style="display:none;"></div>' +
                    '<div id="legacy-day-filter" class="day-filter" style="display:none;">' +
                        '<div class="day-filter-bar" id="legacy-day-filter-bar"></div>' +
                        '<select class="day-filter-select" id="legacy-day-filter-select"></select>' +
                    '</div>' +
                    '<div id="legacy-events-list"></div>' +
                    '<section><a href="/" onclick="event.preventDefault(); navigateHome();" style="color:#c06000;">\u2190 Home</a></section>' +
                '</div>';
            showRoute(containerHtml);

            if (!eventsData || eventsData.length === 0) {
                document.getElementById('legacy-events-list').innerHTML = '<p style="text-align:center;padding:3rem;color:#8b949e;">No events recorded yet.</p>';
                return;
            }

            var events = eventsData.slice().sort(function(a, b) {
                return new Date(b.timestamp) - new Date(a.timestamp);
            });

            var TOTAL_DISTANCE_KM = 3534;
            var progressEl = document.getElementById('legacy-rally-progress');
            for (var pi = 0; pi < events.length; pi++) {
                var pe = events[pi];
                if (pe.distance_from_start_km != null && pe.distance_to_destination_km != null) {
                    var fromStart = Math.round(pe.distance_from_start_km);
                    var toDest = Math.round(pe.distance_to_destination_km);
                    var pct = Math.min(100, Math.max(0, (fromStart / TOTAL_DISTANCE_KM) * 100));
                    progressEl.innerHTML =
                        '<div class="rally-progress-header">' +
                        '<span>From Port Douglas: <strong>' + fromStart.toLocaleString() + ' km</strong></span>' +
                        '<span>To Melbourne: <strong>' + toDest.toLocaleString() + ' km</strong></span>' +
                        '</div>' +
                        '<div class="rally-progress-bar">' +
                        '<div class="rally-progress-fill" style="width:' + pct.toFixed(1) + '%"></div>' +
                        '</div>';
                    progressEl.style.display = '';
                    break;
                }
            }

            var groups = {};
            events.forEach(function(ev) {
                var date = new Date(ev.timestamp).toLocaleDateString('en-CA', { timeZone: TIMEZONE });
                if (!groups[date]) groups[date] = [];
                groups[date].push(ev);
            });

            var container = document.getElementById('legacy-events-list');
            var dates = Object.keys(groups).sort().reverse();

            var filterBar = document.getElementById('legacy-day-filter-bar');
            var filterSelect = document.getElementById('legacy-day-filter-select');

            function activateVideos(group) {
                group.querySelectorAll('.event-video-placeholder').forEach(function(ph) {
                    var src = ph.getAttribute('data-video-src');
                    if (src) {
                        ph.innerHTML = '<video controls preload="none" poster="/captures/intro_poster.jpg" src="' + src + '"></video>';
                        ph.className = 'event-video';
                    }
                });
            }

            function deactivateVideos(group) {
                group.querySelectorAll('.event-video').forEach(function(v) {
                    var video = v.querySelector('video');
                    if (video) {
                        v.setAttribute('data-video-src', video.src);
                        v.innerHTML = '';
                        v.className = 'event-video-placeholder';
                    }
                });
            }

            var filterToDate = null;

            if (dates.length > 1) {
                document.getElementById('legacy-day-filter').style.display = '';

                var allBtn = document.createElement('button');
                allBtn.textContent = 'All';
                allBtn.setAttribute('data-date', 'all');
                filterBar.appendChild(allBtn);

                var allOpt = document.createElement('option');
                allOpt.value = 'all';
                allOpt.textContent = 'All days';
                filterSelect.appendChild(allOpt);

                dates.forEach(function(date) {
                    var parts = date.split('-');
                    var d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                    var label = d.toLocaleDateString('en-AU', {
                        weekday: 'short', day: 'numeric', month: 'short', timeZone: 'UTC'
                    });
                    var count = groups[date].length;

                    var btn = document.createElement('button');
                    btn.textContent = label + ' \u00b7 ' + count;
                    btn.setAttribute('data-date', date);
                    filterBar.appendChild(btn);

                    var opt = document.createElement('option');
                    opt.value = date;
                    opt.textContent = label + ' \u2014 ' + count + ' events';
                    filterSelect.appendChild(opt);
                });

                filterToDate = function(selectedDate) {
                    var dateGroups = container.querySelectorAll('.date-group');
                    dateGroups.forEach(function(g) {
                        var show = selectedDate === 'all' || g.getAttribute('data-date') === selectedDate;
                        g.style.display = show ? '' : 'none';
                        if (show) { activateVideos(g); } else { deactivateVideos(g); }
                    });
                    filterBar.querySelectorAll('button').forEach(function(b) {
                        b.classList.toggle('active', b.getAttribute('data-date') === selectedDate);
                    });
                    filterSelect.value = selectedDate;
                };

                filterBar.addEventListener('click', function(e) {
                    if (e.target.tagName !== 'BUTTON') return;
                    filterToDate(e.target.getAttribute('data-date'));
                });

                filterSelect.addEventListener('change', function() {
                    filterToDate(this.value);
                });
            }

            dates.forEach(function(date) {
                var group = document.createElement('div');
                group.className = 'date-group';
                group.setAttribute('data-date', date);

                var parts = date.split('-');
                var d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
                var heading = document.createElement('h2');
                heading.textContent = d.toLocaleDateString('en-AU', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC'
                });
                group.appendChild(heading);

                var grid = document.createElement('div');
                grid.className = 'events-grid';

                groups[date].forEach(function(ev) {
                    var eventId = ev.id != null ? ev.id : ev.timestamp.replace(/[^0-9]/g, '');
                    var card = document.createElement('div');
                    card.className = 'event-card';
                    card.id = 'event-' + eventId;

                    var badgeClass = 'badge-' + ev.type;
                    var ts = new Date(ev.timestamp);
                    var timeStr = ts.toLocaleTimeString('en-AU', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: TIMEZONE
                    });
                    var displayName = DISPLAY_NAMES[ev.type] || ev.type;

                    var noStats = {MANUAL_CAPTURE: 1, BOOT: 1};
                    var statsHtml = '';
                    if (!noStats[ev.type]) {
                        if (ev.speed_kmh !== undefined && ev.speed_kmh > 0) {
                            statsHtml += '<span>Speed: <strong>' + Math.round(ev.speed_kmh) + ' km/h</strong></span>';
                        }
                        if (ev.peak_g !== undefined && ev.peak_g > 0) {
                            statsHtml += '<span>Peak: <strong>' + ev.peak_g.toFixed(2) + ' g</strong></span>';
                        }
                    }

                    var videoHtml = '';
                    var videoSrc = ev.video_url || (ev.video_path ? '/captures/' + ev.video_path : null);
                    var actionsHtml = '<div class="event-actions">' +
                        '<a href="#" class="share-btn" data-event-id="' + eventId + '">Share</a>';
                    if (videoSrc) {
                        videoHtml = '<div class="event-video-placeholder" data-video-src="' + videoSrc + '"></div>';
                        actionsHtml += '<a href="' + videoSrc + '" download>Download</a>';
                    }
                    actionsHtml += '</div>';

                    card.innerHTML =
                        '<div class="event-header">' +
                        '<span class="badge ' + badgeClass + '">' + displayName + '</span>' +
                        '<span class="event-time">' + timeStr + '</span>' +
                        '</div>' +
                        (statsHtml ? '<div class="event-stats">' + statsHtml + '</div>' : '') +
                        '<div class="event-media">' + videoHtml + actionsHtml + '</div>';

                    grid.appendChild(card);
                });

                group.appendChild(grid);
                container.appendChild(group);
            });

            if (dates.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:3rem;color:#8b949e;">No events recorded yet.</p>';
            } else if (filterToDate) {
                filterToDate(dates[0]);
            } else {
                container.querySelectorAll('.date-group').forEach(activateVideos);
            }

            container.addEventListener('click', function(e) {
                var btn = e.target.closest('.share-btn');
                if (!btn) return;
                e.preventDefault();
                var eid = btn.getAttribute('data-event-id');
                var url = window.location.origin + '/videos?event=' + eid;
                navigator.clipboard.writeText(url).then(function() {
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = 'Share'; }, 2000);
                });
            });

            var params = new URLSearchParams(window.location.search);
            var targetId = params.get('event');
            if (targetId) {
                var el = document.getElementById('event-' + targetId);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('highlighted');
                }
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // Re-run mode detection on tab focus return (D-04)
                var pathname = window.location.pathname;
                if (pathname === '/' || pathname === '/index.html') {
                    renderHomepage();
                }
            }
        });

        var eventsData = null;
        var notesData = null;
        var fuelData = null;
        var driverStatsData = null;
        var agendaData = null;
        var routeData = null;
        var _currentDayMap = null;
        var _countdownTimer = null;
        // Load data sources for SPA router consumption.
        fetch('/captures/events.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(events) {
                if (events) {
                    eventsData = events.filter(function(ev) {
                        return new Date(ev.timestamp) >= RALLY_START;
                    });
                }
            })
            .catch(function() {});

        fetch('/captures/notes.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(notes) { if (notes) notesData = notes.slice().reverse(); })
            .catch(function() {});

        fetch('/captures/fuel.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(fuel) { if (fuel) fuelData = fuel; })
            .catch(function() {});

        fetch('/captures/driver-stats.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { if (data) driverStatsData = data; })
            .catch(function() {});

        // Wait for agenda + route to settle (success or fail), then run the SPA router.
        // The other fetches keep resolving independently into renderEvents/renderNotes/etc.
        Promise.allSettled([
            fetch('/agenda.json', { cache: 'no-cache' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(x) { agendaData = x || agendaData; })
                .catch(function(err) { console.warn('agenda fetch failed', err); }),
            fetch('/captures/route.json', { cache: 'no-cache' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(x) { routeData = x || routeData; })
                .catch(function(err) { console.warn('route fetch failed', err); })
        ]).then(function() { route(); });

        window.navigateToDay = navigateToDay;
        window.navigateHome = navigateHome;
        window.navigateToCar = navigateToCar;
        window.navigateToAbout = navigateToAbout;

    })();
    </script>
</body>
</html>
