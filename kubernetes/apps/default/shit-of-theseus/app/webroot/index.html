<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shit of Theseus — A Team Has No Name — Shitbox Rally 2026</title>

    <!-- Social sharing (Open Graph + Twitter). Static site-wide card so shared
         links render a proper preview instead of falling back to the favicon.
         Per-video cards would need per-event stub pages; not done here. -->

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Shit of Theseus">
    <meta property="og:title" content="Shit of Theseus — Shitbox Rally 2026">
    <meta property="og:description" content="Live telemetry, event footage and timelapse from a 2001 Ford Laser being driven across Australia for charity.">
    <meta property="og:url" content="https://shit-of-theseus.com/">
    <meta property="og:image" content="https://shit-of-theseus.com/route.jpg">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="550">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Shit of Theseus — Shitbox Rally 2026">
    <meta name="twitter:description" content="Live telemetry, event footage and timelapse from a 2001 Ford Laser being driven across Australia for charity.">
    <meta name="twitter:image" content="https://shit-of-theseus.com/route.jpg">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">  <!-- pragma: allowlist secret -->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { background: #0d1117; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: #e0a040; text-decoration: none; }
        a:hover { text-decoration: underline; color: #f0c060; }

        /* Header */
        header {
            border-bottom: 1px solid #2a1f0e;
            padding: 1.25rem 2rem;
            background: linear-gradient(180deg, #161b22 0%, #12100c 100%);
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .header-logo {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
        }
        .header-text { flex: 1; }
        .header-text h1 {
            font-size: 1.5rem;
            color: #f0dbb8;
            font-weight: 700;
        }
        .header-text .team-name {
            color: #e0a040;
            font-size: 0.95rem;
            font-weight: 500;
            font-style: italic;
        }
        .header-text .subtitle {
            color: #8b949e;
            font-size: 0.8rem;
            margin-top: 0.15rem;
        }
        .donate-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            background: #c06000;
            color: #fff !important;
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: 8px;
            text-decoration: none !important;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .donate-btn:hover { background: #e07010; transform: translateY(-1px); }
        .donate-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* Story-shaped fundraising line, sits under the header on every tab */
        .donation-banner {
            margin: 0 1rem 0.75rem;
            padding: 0.6rem 1rem;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 0.95rem;
            line-height: 1.4;
            text-align: center;
        }
        .donation-banner strong { color: #f9826c; font-weight: 600; }
        .donation-banner a { color: #58a6ff; text-decoration: none; }
        .donation-banner a:hover { text-decoration: underline; }

        .code-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.1rem;
            background: #21262d;
            color: #f0f6fc !important;
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-decoration: none !important;
            transition: background 0.2s, transform 0.1s, border-color 0.2s;
            white-space: nowrap;
        }
        .code-btn:hover { background: #30363d; border-color: #484f58; transform: translateY(-1px); }
        .code-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .donate-closer {
            margin-top: 2rem;
            padding: 2rem 1.75rem;
            background: linear-gradient(135deg, #1a1208 0%, #2a1f0e 100%);
            border: 1px solid #c06000;
            border-radius: 12px;
            text-align: center;
        }
        .donate-closer h3 { margin-top: 0; color: #f0dbb8; }
        .donate-closer p { color: #c9d1d9; max-width: 640px; margin: 0.75rem auto; line-height: 1.6; }
        .donate-closer .donate-btn { margin-top: 1rem; padding: 0.75rem 1.75rem; font-size: 1rem; }

        /* Nav */
        nav {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            border-bottom: 1px solid #2a1f0e;
            background: #161b22;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        nav a {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #c9d1d9;
            transition: background 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        nav a:hover { background: #2a1f0e; text-decoration: none; }
        nav a.active { background: #c06000; color: #fff; }

        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

        .section { display: none; }
        .section.active { display: block; }

        /* Rally progress banner */
        .rally-progress {
            background: #161b22;
            border: 1px solid #2a1f0e;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
        }
        .rally-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .rally-progress-header span {
            font-size: 0.85rem;
            color: #8b949e;
        }
        .rally-progress-header strong {
            color: #f0dbb8;
        }
        .rally-progress-bar {
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .rally-progress-fill {
            height: 100%;
            background: #c06000;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Day-nav progress bar (Phase 19 — D-14, D-15) */
        .day-nav {
            display: grid;
            grid-auto-columns: 1fr;
            grid-auto-flow: column;
            gap: 2px;
            background: #161b22;
            border: 1px solid #2a1f0e;
            border-radius: 8px;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .day-nav-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 0.25rem;
            border-radius: 4px;
            background: #21262d;
            color: #8b949e;
            text-align: center;
            text-decoration: none;
            transition: background 0.15s, opacity 0.15s;
        }
        .day-nav-segment.completed { background: #c06000; color: #fff; }
        .day-nav-segment.current   { background: #e0a040; color: #0d1117; font-weight: 600; }
        .day-nav-segment.future    { background: #21262d; color: #484f58; cursor: pointer; }
        .day-nav-segment.completed:hover,
        .day-nav-segment.current:hover { opacity: 0.85; }
        .day-nav-segment:focus-visible { outline: 2px solid #e0a040; outline-offset: 2px; }
        .day-nav-number { font-size: 1.1rem; font-weight: 600; line-height: 1.1; }
        .day-nav-date   { font-size: 0.7rem; margin-top: 0.15rem; }
        @media (max-width: 600px) {
            .day-nav-date { display: none; }
            .day-nav-segment { padding: 0.4rem 0.15rem; }
        }

        /* Day page layout (Phase 19 — D-11, D-12, D-13) */
        .day-page { max-width: 960px; margin: 0 auto; }
        .day-page > section { margin-bottom: 2rem; }
        .day-header {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 1.5rem 1.75rem;
        }
        .day-header h1 { margin: 0; color: #f0dbb8; font-size: 1.75rem; }
        .day-header .day-subtitle { color: #8b949e; font-size: 0.95rem; margin-top: 0.25rem; }
        .day-agenda {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 1.25rem 1.5rem; line-height: 1.6;
        }
        .day-agenda h2 { margin: 0 0 0.75rem 0; color: #f0dbb8; font-size: 1.1rem; }
        .day-agenda .agenda-row { display: flex; gap: 0.5rem; margin-bottom: 0.35rem; color: #c9d1d9; }
        .day-agenda .agenda-row strong { color: #e0a040; min-width: 90px; }
        .day-agenda ul.meals { list-style: none; padding: 0; margin: 0.25rem 0 0 0; }
        .day-agenda ul.meals li { color: #c9d1d9; }
        .day-agenda ul.meals li time { color: #e0a040; margin-right: 0.4rem; }
        .day-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
        }
        .day-stat-card {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 0.75rem 1rem; text-align: center;
        }
        .day-stat-card .stat-label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .day-stat-card .stat-value { color: #f0dbb8; font-size: 1.35rem; font-weight: 600; margin-top: 0.25rem; }
        .day-section-placeholder {
            background: #161b22; border: 1px dashed #30363d; border-radius: 8px;
            padding: 1.25rem; color: #8b949e; font-style: italic;
        }
        .day-section-heading {
            color: #f0dbb8; font-size: 1.2rem; margin: 0 0 0.75rem 0;
        }

        /* Video highlights grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .video-card {
            background: #161b22;
            border: 1px solid #2a1f0e;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-card video {
            width: 100%;
            display: block;
            background: #000;
        }
        .video-card-meta {
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #8b949e;
        }
        .video-card-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #fff;
        }
        .video-card-time { color: #c9d1d9; }

        /* Timelapse section */
        .timelapse-player {
            background: #161b22;
            border: 1px solid #2a1f0e;
            border-radius: 8px;
            overflow: hidden;
        }
        .timelapse-player video {
            width: 100%;
            display: block;
            background: #000;
        }

        @media (max-width: 600px) {
            .day-page { padding: 0 0.5rem; }
            .day-header { padding: 1rem 1.25rem; }
            .day-header h1 { font-size: 1.35rem; }
            .day-stats { grid-template-columns: repeat(2, 1fr); }
            .video-grid { grid-template-columns: 1fr; }
        }

        /* Timeline spine (Phase 19 — D-06, D-07) */
        .spine { position: relative; padding-left: 0; }
        .spine-empty {
            background: #161b22; border: 1px dashed #30363d; border-radius: 8px;
            padding: 1.25rem; color: #8b949e; font-style: italic; text-align: center;
        }
        .spine-item {
            display: grid;
            grid-template-columns: 72px 24px 1fr;
            gap: 0.75rem;
            align-items: start;
            margin-bottom: 1rem;
        }
        .spine-time {
            color: #8b949e; font-size: 0.8rem; font-variant-numeric: tabular-nums;
            padding-top: 0.5rem; text-align: right;
        }
        .spine-rail {
            position: relative; width: 24px; min-height: 100%;
        }
        .spine-rail::before {
            content: ''; position: absolute; left: 11px; top: 0; bottom: -1rem;
            width: 2px; background: #2a1f0e;
        }
        .spine-item:last-child .spine-rail::before { bottom: 50%; }
        .spine-dot {
            position: absolute; left: 4px; top: 0.6rem;
            width: 16px; height: 16px; border-radius: 50%;
            background: #21262d; border: 2px solid #0d1117;
        }
        .spine-card {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 0.75rem 1rem; color: #c9d1d9;
            scroll-margin-top: 5rem;
        }
        .spine-card-flash { animation: spineflash 1.6s ease-out; }
        @keyframes spineflash {
            0%   { border-color: #e0a040; box-shadow: 0 0 0 2px rgba(224,160,64,0.55); }
            100% { border-color: #2a1f0e; box-shadow: 0 0 0 2px rgba(224,160,64,0); }
        }
        .spine-card .spine-card-title { color: #f0dbb8; font-weight: 600; margin-bottom: 0.25rem; }
        .spine-card .spine-card-meta  { color: #8b949e; font-size: 0.8rem; }
        .spine-card .spine-card-body  { color: #c9d1d9; margin-top: 0.35rem; line-height: 1.5; }
        .spine-card video { display: block; margin-top: 0.5rem; max-width: 100%; border-radius: 4px; }
        .spine-item.event .spine-dot        { background: #da3633; }
        .spine-item.note  .spine-dot        { background: #1f6feb; }
        .spine-item.fuel  .spine-dot        { background: #2ea043; }
        .spine-item.driver_change .spine-dot { background: #8957e5; }
        .spine-item.stage_start .spine-dot  { background: #e0a040; }
        .spine-item.stage_end   .spine-dot  { background: #8b949e; }
        .spine-item.agenda_meal .spine-dot    { background: #d29922; }
        .spine-item.agenda_camping .spine-dot { background: #6e7681; }
        @media (max-width: 600px) {
            .spine-item { grid-template-columns: 56px 20px 1fr; gap: 0.5rem; }
            .spine-time { font-size: 0.72rem; }
            .spine-dot  { left: 2px; width: 14px; height: 14px; }
        }

        /* Day-page map (Phase 19 — D-21, D-22) */
        .day-map-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #0d1117;
            border: 1px solid #2a1f0e;
            border-radius: 8px;
            overflow: hidden;
        }
        .day-map-empty {
            background: #161b22; border: 1px dashed #30363d; border-radius: 8px;
            padding: 1.25rem; color: #8b949e; font-style: italic; text-align: center;
        }
        @media (max-width: 600px) {
            .day-map-container { height: 280px; }
        }

        /* Before-mode homepage (Phase 19 — D-16, NARR-01) */
        .before-hero {
            text-align: center;
            padding: 2rem 1rem 1.5rem 1rem;
        }
        .before-hero h1 {
            color: #f0dbb8; font-size: 2rem; margin: 0 0 0.5rem 0;
        }
        .before-hero .rally-team {
            color: #e0a040; font-size: 1.1rem; margin-bottom: 0.25rem;
        }
        .before-hero .rally-route {
            color: #8b949e; font-size: 0.95rem;
        }
        .before-countdown {
            display: flex; justify-content: center; gap: 0.75rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .countdown-tile {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 0.75rem 1rem;
            min-width: 72px;
            text-align: center;
        }
        .countdown-tile .cd-value {
            color: #e0a040; font-size: 2rem; font-weight: 600;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .countdown-tile .cd-label {
            color: #8b949e; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.05em; margin-top: 0.35rem;
        }
        .before-cta {
            text-align: center; color: #c9d1d9; font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        .before-planned-route {
            text-align: center; margin-bottom: 2rem;
        }
        .before-planned-route img {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid #2a1f0e;
        }
        .before-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .before-day-list {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .before-day-row {
            display: grid;
            grid-template-columns: 56px 80px 1fr;
            gap: 1rem;
            align-items: start;
            padding: 0.75rem 1rem;
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            text-decoration: none;
            color: #c9d1d9;
            transition: border-color 0.15s;
        }
        .before-day-row:hover { border-color: #e0a040; }
        .before-day-row .bd-num {
            color: #e0a040; font-size: 1.5rem; font-weight: 600;
            text-align: center; line-height: 1;
        }
        .before-day-row .bd-date { color: #8b949e; font-size: 0.85rem; }
        .before-day-row .bd-title { color: #f0dbb8; font-weight: 600; }
        .before-day-row .bd-route { color: #8b949e; font-size: 0.85rem; margin-top: 0.2rem; }
        @media (max-width: 600px) {
            .before-hero h1 { font-size: 1.5rem; }
            .countdown-tile { min-width: 58px; padding: 0.5rem 0.6rem; }
            .countdown-tile .cd-value { font-size: 1.4rem; }
            .before-day-row { grid-template-columns: 44px 1fr; }
            .before-day-row .bd-date { grid-column: 2; }
            .before-day-row > div:last-child { grid-column: 1 / -1; }
        }

        /* Live-mode homepage (Phase 19 — D-17, D-08, NARR-01) */
        .live-badge {
            display: inline-block;
            background: #da3633; color: #fff;
            font-size: 0.7rem; font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.08em;
            vertical-align: middle;
            margin-left: 0.5rem;
            animation: livepulse 2s ease-in-out infinite;
        }
        @keyframes livepulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.55; }
        }
        .current-driver-widget {
            display: flex; align-items: center; gap: 1rem;
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
        }
        .current-driver-widget .cdw-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: #c06000; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 600;
            flex-shrink: 0;
        }
        .current-driver-widget .cdw-text { flex: 1; }
        .current-driver-widget .cdw-label {
            color: #8b949e; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .current-driver-widget .cdw-name {
            color: #f0dbb8; font-size: 1.15rem; font-weight: 600;
            margin-top: 0.2rem;
        }
        .current-driver-widget .cdw-time {
            color: #8b949e; font-size: 0.85rem;
        }
        @media (max-width: 600px) {
            .current-driver-widget { padding: 0.75rem 1rem; }
            .current-driver-widget .cdw-avatar { width: 40px; height: 40px; font-size: 1.15rem; }
            .current-driver-widget .cdw-name   { font-size: 1rem; }
        }

        /* Archive-mode homepage (Phase 19 — D-18, NARR-01) */
        .archive-overview {
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
        }
        .archive-overview h1 { color: #f0dbb8; margin: 0 0 0.25rem 0; font-size: 1.6rem; }
        .archive-overview .archive-subtitle { color: #8b949e; margin-bottom: 1rem; font-size: 0.95rem; }
        .archive-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
        }
        .archive-day-grid {
            display: flex; flex-direction: column; gap: 0.75rem;
        }
        .archive-day-card {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1rem;
            background: #161b22; border: 1px solid #2a1f0e; border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: #c9d1d9;
            transition: border-color 0.15s;
        }
        .archive-day-card:hover { border-color: #e0a040; }
        .archive-day-card .adc-thumb {
            position: relative;
            background: #21262d;
            min-height: 100px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .archive-day-card .adc-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .archive-day-card .adc-thumb-fallback {
            color: #e0a040; font-size: 2.5rem; font-weight: 600;
        }
        .archive-day-card .adc-body {
            padding: 1rem 1rem 1rem 0; display: flex; flex-direction: column; justify-content: center;
        }
        .archive-day-card .adc-header { display: flex; align-items: baseline; gap: 0.75rem; }
        .archive-day-card .adc-num   { color: #e0a040; font-weight: 600; font-size: 0.95rem; }

            background: #000;
            display: block;

            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>  <!-- pragma: allowlist secret -->
    <script>
    // Donation banner — fetches /donation.json (written by the
    // donation-exporter sidecar) and renders a one-line story under
    // the header. Refreshes every 5 minutes; matches the exporter
    // poll cadence. Quietly hides itself on fetch errors so a 204
    // pre-first-poll doesn't leave a dead box on the page.
    (function() {
        var el = document.getElementById('donation-banner');
        if (!el) return;
        var fmt = function(n) { return '$' + n.toLocaleString('en-AU'); };
        var donateUrl = 'https://short.albatrossflavour.com/Shitbox';
        var renderCopy = function(d) {
            var raised = fmt(d.raised_aud);
            var goal = fmt(d.goal_aud);
            var pct = d.percent;
            if (pct >= 100) {
                return '<strong>' + raised + ' raised</strong> — ' + pct.toFixed(0) +
                    '% past our ' + goal + ' goal. Every extra dollar still goes to ' +
                    'the Cancer Council. <a href="' + donateUrl + '" target="_blank" ' +
                    'rel="noopener">Top us up</a>.';
            }
            return '<strong>' + raised + ' raised</strong> towards our ' + goal +
                ' goal — ' + pct.toFixed(0) + '% of the way there. Thanks legends. ' +
                '<a href="' + donateUrl + '" target="_blank" rel="noopener">Chip in</a>.';
        };
        var refresh = function() {
            fetch('/donation.json', { cache: 'no-store' })
                .then(function(r) {
                    if (!r.ok || r.status === 204) throw new Error('no data');
                    return r.json();
                })
                .then(function(d) {
                    if (typeof d.raised_aud !== 'number') throw new Error('bad data');
                    el.innerHTML = renderCopy(d);
                    el.style.display = 'block';
                })
                .catch(function() { el.style.display = 'none'; });
        };
        refresh();
        setInterval(refresh, 5 * 60 * 1000);
    })();
    </script>
    <script>
    (function() {
        var BADGE_COLORS = {
            HIGH_G: '#da3633',
            BIG_CORNER: '#d29922',
            HARD_BRAKE: '#f85149',
            ROUGH_ROAD: '#8957e5',
            BUTTON: '#238636',
            MANUAL_CAPTURE: '#238636',
            BOOT: '#40a0c0'
        };

        var TIMEZONE = 'Australia/Sydney';
        var RALLY_START = new Date('2025-01-30T00:00:00+10:00');

        // Absolute MP4 URL for an event, or null if it has none.
        function _eventVideoUrl(ev) {
            return ev.video_url || (ev.video_path ? '/captures/' + ev.video_path : null);
        }

        // Make a root-relative src shareable by prefixing the origin. Passes through
        // anything already absolute (a full video_url).
        function _absoluteUrl(src) {
            if (!src) return src;
            return /^https?:\/\//.test(src) ? src : window.location.origin + src;
        }

        // The events we surface anywhere on the site: rally-window only, and only
        // those with an MP4. Everything downstream (videos page, day spine, map pins)
        // consumes eventsData, so filtering here keeps every listing consistent.
        function _usableEvents(list) {
            if (!Array.isArray(list)) return [];
            return list.filter(function(ev) {
                return new Date(ev.timestamp) >= RALLY_START && _eventVideoUrl(ev);
            });
        }

        var GRAFANA_BASE = 'https://grafana.shit-of-theseus.com/d/shitbox-rally-v2/shitbox-rally-command-centre';
        var GRAFANA_LEAD_MS  = 10000; // 10 s lead-in before the event start
        var GRAFANA_TRAIL_MS = 30000; // 30 s trail-out after the event end

        function _eventTelemetryUrl(ev) {
            // Build a Grafana deep-link scoped to the event's window plus a
            // small lead-in and trail-out. Returns '' if the event lacks a
            // parseable timestamp so the caller can omit the link.
            if (!ev || !ev.timestamp) return '';
            var startMs = new Date(ev.timestamp).getTime();
            if (isNaN(startMs)) return '';
            var dur = Number(ev.duration_ms) || 0;
            var fromMs = startMs - GRAFANA_LEAD_MS;
            var toMs   = startMs + dur + GRAFANA_TRAIL_MS;
            return GRAFANA_BASE + '?orgId=1&from=' + fromMs + '&to=' + toMs;
        }

        var DISPLAY_NAMES = {
            HIGH_G: 'High G-Force',
            BIG_CORNER: 'Big Corner',
            HARD_BRAKE: 'Hard Brake',
            ROUGH_ROAD: 'Rough Road',
            BUTTON: 'Manual',
            MANUAL_CAPTURE: 'Manual',
            BOOT: 'Startup'
        };

        /**
         * Decide which homepage mode to render.
         *
         * Inside the rally window we always return 'live', regardless of how stale
         * routeData is. Long stretches without Telstra coverage on the unsealed
         * sections mean we routinely go many hours without a sync — that's not a
         * fault state and viewers shouldn't see the page silently flip to archive.
         * The live header surfaces "Last update: Xh ago" so freshness is visible.
         *
         * @param {object|null} agenda — parsed agenda.json, or null on fetch failure
         * @returns {'before'|'live'|'archive'}
         */
        function detectMode(agenda) {
            if (!agenda || !agenda.rally || !agenda.rally.start_date || !agenda.rally.end_date) {
                return 'archive';
            }
            var today = new Date().toLocaleDateString('en-CA', { timeZone: TIMEZONE });
            var start = agenda.rally.start_date;
            var end = agenda.rally.end_date;
            if (today < start) return 'before';
            if (today > end) return 'archive';
            return 'live';
        }

        // Self-test — logs to console if any assertion fails. No test framework available.
        (function _detectModeSelfTest() {
            function assertEq(actual, expected, label) {
                if (actual !== expected) {
                    console.error('detectMode SELF-TEST FAIL:', label, 'got', actual, 'wanted', expected);
                }
            }
            var a = { rally: { start_date: '2099-01-01', end_date: '2099-01-10' } };
            assertEq(detectMode(a), 'before', 'future rally');
            var b = { rally: { start_date: '2000-01-01', end_date: '2000-01-10' } };
            assertEq(detectMode(b), 'archive', 'past rally');
            var c = { rally: { start_date: '1900-01-01', end_date: '2999-01-01' } };
            assertEq(detectMode(c), 'live', 'in-range');
            assertEq(detectMode(null), 'archive', 'no agenda');
            assertEq(detectMode({}), 'archive', 'malformed agenda');
        })();

        /**
         * Format an ISO-8601 timestamp as a relative "last update" string.
         * Returns null for missing/unparseable/future timestamps — caller hides the line.
         */
        function formatLastUpdate(iso) {
            if (!iso) return null;
            var d = new Date(iso);
            if (isNaN(d.getTime())) return null;
            var ms = Date.now() - d.getTime();
            if (ms < 0) return null;
            var mins = Math.floor(ms / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + ' min ago';
            var hours = Math.floor(mins / 60);
            if (hours < 24) return hours + ' h ago';
            var days = Math.floor(hours / 24);
            return days + ' day' + (days === 1 ? '' : 's') + ' ago';
        }

        var DAY_URL_RE = /^\/day\/(\d{4}-\d{2}-\d{2})\/?$/;
        var ABOUT_URL_RE = /^\/about\/?$/;
        var CAR_URL_RE = /^\/car\/?$/;
        var VIDEOS_URL_RE = /^\/videos\/?$/;

        function showRoute(html) {
            // Single entry-point for router-owned DOM. Hides all .section children of <main>.
            document.querySelectorAll('main > .section').forEach(function(s) { s.style.display = 'none'; });
            var host = document.getElementById('dynamic-route');
            host.style.display = '';
            host.innerHTML = html;
        }

        function showLegacySections() {
            // Re-show the existing .section-based home. Used when router has nothing to render.
            document.querySelectorAll('main > .section').forEach(function(s) { s.style.display = ''; });
            var host = document.getElementById('dynamic-route');
            host.style.display = 'none';
            host.innerHTML = '';
        }

        function route() {
            var pathname = window.location.pathname;
            var dayMatch = pathname.match(DAY_URL_RE);
            if (dayMatch) {
                var dayISO = dayMatch[1];
                // Validate the captured date parses
                var d = new Date(dayISO + 'T00:00:00Z');
                if (isNaN(d.getTime())) { renderHomepage(); return; }
                renderDayPage(dayISO);
                return;
            }
            if (CAR_URL_RE.test(pathname)) {
                renderCar();
                return;
            }
            if (ABOUT_URL_RE.test(pathname)) {
                renderAbout();
                return;
            }
            if (VIDEOS_URL_RE.test(pathname)) {
                renderLegacyVideos();
                return;
            }
            renderHomepage();
        }

        function navigateToDay(dayISO) {
            history.pushState({ route: 'day', day: dayISO }, '', '/day/' + dayISO);
            renderDayPage(dayISO);
            window.scrollTo(0, 0);
        }

        function navigateHome() {
            history.pushState({ route: 'home' }, '', '/');
            renderHomepage();
            window.scrollTo(0, 0);
        }

        function navigateToCar() {
            history.pushState({ route: 'car' }, '', '/car');
            route();
            window.scrollTo(0, 0);
        }

        function navigateToAbout() {
            history.pushState({ route: 'about' }, '', '/about');
            route();
            window.scrollTo(0, 0);
        }

        window.addEventListener('popstate', function() {
            route();
        });

        // Day-page helpers (Plan 19-05)
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderAgendaContext(agendaDay) {
            if (!agendaDay) {
                return '<section class="day-agenda"><p style="color:#8b949e;margin:0;">No agenda entry for this day.</p></section>';
            }
            var parts = ['<section class="day-agenda"><h2>Agenda</h2>'];
            if (agendaDay.route) {
                parts.push('<div class="agenda-row"><strong>Route</strong><span>' + escapeHtml(agendaDay.route) + '</span></div>');
            }
            if (agendaDay.camping) {
                parts.push('<div class="agenda-row"><strong>Camping</strong><span>' + escapeHtml(agendaDay.camping) + '</span></div>');
            }
            if (agendaDay.meals && agendaDay.meals.length > 0) {
                var meals = '<div class="agenda-row"><strong>Meals</strong><ul class="meals">';
                agendaDay.meals.forEach(function(m) {
                    meals += '<li><time>' + escapeHtml(m.time || '') + '</time>' + escapeHtml(m.where || '') + '</li>';
                });
                meals += '</ul></div>';
                parts.push(meals);
            }
            if (agendaDay.notes) {
                parts.push('<div class="agenda-row"><strong>Notes</strong><span>' + escapeHtml(agendaDay.notes) + '</span></div>');
            }
            parts.push('</section>');
            return parts.join('');
        }

        function _dayOf(iso) {
            try { return new Date(iso).toLocaleDateString('en-CA', { timeZone: TIMEZONE }); }
            catch(e) { return null; }
        }

        function _haversineKm(lat1, lng1, lat2, lng2) {
            var R = 6371;
            var toRad = function(deg) { return deg * Math.PI / 180; };
            var dLat = toRad(lat2 - lat1);
            var dLng = toRad(lng2 - lng1);
            var a = Math.sin(dLat/2) * Math.sin(dLat/2)
                  + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) * Math.sin(dLng/2);
            return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
        }

        function computeDayStats(dayISO, events, route, fuel, breakdowns) {
            var dayEvents = (events || []).filter(function(ev) { return _dayOf(ev.timestamp) === dayISO; });
            var dayFuel   = (fuel   || []).filter(function(f)  { return _dayOf(f.timestamp_utc) === dayISO; });
            var dayBreakdowns = (breakdowns || []).filter(function(b) { return _dayOf(b.timestamp_utc) === dayISO; });
            var daySlice  = (route && route.days && route.days[dayISO]) || null;

            var kmDriven = 0;
            if (daySlice && daySlice.points && daySlice.points.length > 1) {
                for (var i = 1; i < daySlice.points.length; i++) {
                    kmDriven += _haversineKm(
                        daySlice.points[i-1][0], daySlice.points[i-1][1],
                        daySlice.points[i][0], daySlice.points[i][1]
                    );
                }
            }

            var peakG = 0;
            var topSpeed = 0;
            dayEvents.forEach(function(ev) {
                // Stored peak_g is capped/broken (max 1.00, uncorrelated); reconstruct the
                // true total-G magnitude from the surviving component peaks instead.
                if (ev.peak_ax != null && ev.peak_ay != null && ev.peak_az != null) {
                    var g = Math.sqrt(ev.peak_ax * ev.peak_ax + ev.peak_ay * ev.peak_ay + ev.peak_az * ev.peak_az);
                    if (g > peakG) peakG = g;
                }
                if (ev.speed_kmh != null && ev.speed_kmh > topSpeed) topSpeed = ev.speed_kmh;
            });

            var fuelBurned = 0;
            dayFuel.forEach(function(f) { if (f.volume_litres != null) fuelBurned += f.volume_litres; });

            return {
                km: kmDriven,
                peakG: peakG,
                topSpeed: topSpeed,
                fuelBurned: fuelBurned,
                eventCount: dayEvents.length,
                breakdownCount: dayBreakdowns.length,
                hasData: daySlice != null || dayEvents.length > 0 || dayFuel.length > 0 || dayBreakdowns.length > 0
            };
        }

        // Timeline spine (Plan 19-06 — D-06, D-07)
        function _formatSpineTime(iso) {
            try {
                var d = new Date(iso);
                if (isNaN(d.getTime())) return '';
                return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: TIMEZONE });
            } catch (e) { return ''; }
        }

        function buildSpine(dayISO, data) {
            var items = [];
            var events = (data && data.events) || [];
            var notes  = (data && data.notes)  || [];
            var fuel   = (data && data.fuel)   || [];
            var agendaDay = (data && data.agendaDay) || null;

            events.forEach(function(ev) {
                if (_dayOf(ev.timestamp) !== dayISO) return;
                var ts = Date.parse(ev.timestamp);
                if (isNaN(ts)) return;
                items.push({ kind: 'event', _ts: ts, ts_iso: ev.timestamp, payload: ev });
            });

            notes.forEach(function(n) {
                if (_dayOf(n.timestamp_utc) !== dayISO) return;
                var ts = Date.parse(n.timestamp_utc);
                if (isNaN(ts)) return;
                items.push({ kind: 'note', _ts: ts, ts_iso: n.timestamp_utc, payload: n });
            });

            // Fuel markers removed — fuel tracking was never used on this rally.

            // Driver-change markers: derived from events[].active_driver transitions within this day.
            var driverSeq = events
                .filter(function(ev) { return _dayOf(ev.timestamp) === dayISO && ev.active_driver; })
                .sort(function(a, b) { return Date.parse(a.timestamp) - Date.parse(b.timestamp); });
            var prev = null;
            driverSeq.forEach(function(ev) {
                if (ev.active_driver !== prev) {
                    var ts = Date.parse(ev.timestamp);
                    if (!isNaN(ts)) {
                        items.push({
                            kind: 'driver_change', _ts: ts, ts_iso: ev.timestamp,
                            payload: { from: prev, to: ev.active_driver }
                        });
                    }
                    prev = ev.active_driver;
                }
            });

            // Agenda markers: meals + camping. Meals have HH:MM time; camping pins to 20:00 local.
            if (agendaDay && agendaDay.meals) {
                agendaDay.meals.forEach(function(m) {
                    if (!m.time) return;
                    var iso = dayISO + 'T' + m.time + ':00';
                    var ts = Date.parse(iso + '+10:00'); // Sydney-ish; close enough for ordering
                    if (isNaN(ts)) return;
                    items.push({ kind: 'agenda_meal', _ts: ts, ts_iso: iso, payload: m });
                });
            }
            if (agendaDay && agendaDay.camping) {
                var campIso = dayISO + 'T20:00:00';
                var campTs = Date.parse(campIso + '+10:00');
                if (!isNaN(campTs)) {
                    items.push({ kind: 'agenda_camping', _ts: campTs, ts_iso: campIso, payload: { where: agendaDay.camping } });
                }
            }

            // Stage bookends: first and last event of the day = start/end markers for now.
            // (Future: derive from GPS motion transitions. Out of scope this plan — extension point.)
            // Sort chronologically first — items isn't sorted until below, so first/last in
            // insertion order is an arbitrary event, not the earliest/latest of the day.
            var dayEvents = items.filter(function(i) { return i.kind === 'event'; })
                .sort(function(a, b) { return a._ts - b._ts; });
            if (dayEvents.length > 0) {
                items.push({
                    kind: 'stage_start', _ts: dayEvents[0]._ts - 1, ts_iso: dayEvents[0].ts_iso,
                    payload: { label: 'Day started' }
                });
                var last = dayEvents[dayEvents.length - 1];
                items.push({
                    kind: 'stage_end', _ts: last._ts + 1, ts_iso: last.ts_iso,
                    payload: { label: 'Last activity' }
                });
            }

            items.sort(function(a, b) { return a._ts - b._ts; });
            return items;
        }

        // Stable per-event anchor, shared by the day spine card and the map marker so
        // clicking a marker can scroll to the matching card. Matches the /events id scheme.
        function _eventAnchorId(ev) {
            var raw = ev.id != null ? ev.id : (ev.timestamp || '').replace(/[^0-9]/g, '');
            return 'spine-event-' + raw;
        }

        function _spineEventCard(ev) {
            var type = escapeHtml(ev.type || 'EVENT');
            var colour = BADGE_COLORS[ev.type] || '#8b949e';
            var metaBits = [];
            if (ev.peak_g != null)         metaBits.push(Number(ev.peak_g).toFixed(2) + ' g');
            if (ev.speed_kmh != null)      metaBits.push(Number(ev.speed_kmh).toFixed(0) + ' km/h');
            if (ev.duration_ms != null)    metaBits.push((Number(ev.duration_ms)/1000).toFixed(1) + ' s');
            var video = '';
            var videoSrc = ev.video_url || (ev.video_path ? '/captures/' + ev.video_path : null);
            if (videoSrc) {
                // Poster placeholder + play button, like the /videos page — swaps to <video>
                // on click (see the #day-spine handler). Lazy: no video preloaded until tapped.
                var posterUrl = ev.poster_url || '/captures/intro_poster.jpg';
                video = '<div class="event-video-placeholder" data-video-src="' + escapeHtml(videoSrc) + '" data-poster-url="' + escapeHtml(posterUrl) + '">'
                      +   '<img class="evp-poster" src="' + escapeHtml(posterUrl) + '" alt="" loading="lazy">'
                      +   '<button type="button" class="evp-play" aria-label="Play video"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 3.5v13l11-6.5z"/></svg></button>'
                      + '</div>';
            }
            var actions = '';
            if (ev.id != null || videoSrc) {
                actions = '<div class="event-actions">';
                if (videoSrc) actions += '<a href="#" class="share-btn" data-share-url="' + escapeHtml(videoSrc) + '">Share</a>';
                if (videoSrc) actions += '<a href="' + escapeHtml(videoSrc) + '" download>Download</a>';
                var _tu = _eventTelemetryUrl(ev);
                if (_tu) actions += '<a href="' + escapeHtml(_tu) + '" target="_blank" rel="noopener">Telemetry →</a>';
                actions += '</div>';
            }
            return '<div class="spine-card" id="' + _eventAnchorId(ev) + '">'
                 +   '<div class="spine-card-title" style="color:' + colour + ';">' + type + '</div>'
                 +   (metaBits.length ? '<div class="spine-card-meta">' + escapeHtml(metaBits.join(' \u00b7 ')) + '</div>' : '')
                 +   video
                 +   actions
                 + '</div>';
        }

        function _spineNoteCard(n) {
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title">Note</div>'
                 +   '<div class="spine-card-body">' + escapeHtml(n.body || '') + '</div>'
                 + '</div>';
        }

        function _spineFuelCard(f) {
            // PII guard: NEVER read cost_aud or price_aud from fuel payloads.
            var bits = [];
            if (f.volume_litres != null) bits.push(Number(f.volume_litres).toFixed(1) + ' L');
            if (f.km_per_litre != null)  bits.push(Number(f.km_per_litre).toFixed(1) + ' km/L');
            if (f.odometer_km != null)   bits.push('odo ' + Number(f.odometer_km).toFixed(0) + ' km');
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title" style="color:#2ea043;">Fuel stop</div>'
                 +   '<div class="spine-card-meta">' + escapeHtml(bits.join(' \u00b7 ')) + '</div>'
                 + '</div>';
        }

        function _spineDriverChange(p) {
            var from = p.from ? escapeHtml(p.from) : 'Start';
            var to   = escapeHtml(p.to || '');
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title" style="color:#8957e5;">Driver change</div>'
                 +   '<div class="spine-card-body">' + from + ' \u2192 ' + to + '</div>'
                 + '</div>';
        }

        function _spineStageBookend(kind, p) {
            var label = escapeHtml(p.label || kind);
            var colour = (kind === 'stage_start') ? '#e0a040' : '#8b949e';
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title" style="color:' + colour + ';">' + label + '</div>'
                 + '</div>';
        }

        function _spineAgendaMeal(m) {
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title" style="color:#d29922;">Meal</div>'
                 +   '<div class="spine-card-body">' + escapeHtml(m.where || '') + '</div>'
                 + '</div>';
        }

        function _spineAgendaCamping(p) {
            return '<div class="spine-card">'
                 +   '<div class="spine-card-title" style="color:#6e7681;">Camp</div>'
                 +   '<div class="spine-card-body">' + escapeHtml(p.where || '') + '</div>'
                 + '</div>';
        }

        function renderSpine(items) {
            if (!items || items.length === 0) {
                return '<div class="spine-empty">Nothing logged yet for this day.</div>';
            }
            var out = '<div class="spine">';
            items.forEach(function(it) {
                var time = _formatSpineTime(it.ts_iso);
                var card;
                switch (it.kind) {
                    case 'event':           card = _spineEventCard(it.payload); break;
                    case 'note':            card = _spineNoteCard(it.payload); break;
                    case 'fuel':            card = _spineFuelCard(it.payload); break;
                    case 'driver_change':   card = _spineDriverChange(it.payload); break;
                    case 'stage_start':
                    case 'stage_end':       card = _spineStageBookend(it.kind, it.payload); break;
                    case 'agenda_meal':     card = _spineAgendaMeal(it.payload); break;
                    case 'agenda_camping':  card = _spineAgendaCamping(it.payload); break;
                    default:                card = '<div class="spine-card">' + escapeHtml(it.kind) + '</div>';
                }
                out += '<div class="spine-item ' + it.kind + '">'
                    +    '<div class="spine-time">' + escapeHtml(time) + '</div>'
                    +    '<div class="spine-rail"><div class="spine-dot"></div></div>'
                    +    card
                    +  '</div>';
            });
            out += '</div>';
            return out;
        }

        // Day-page map (Plan 19-07 — D-21 full-rally backdrop, D-22 day-slice highlight)
        function _teardownDayMap() {
            if (_currentDayMap) {
                try { _currentDayMap.remove(); } catch (e) {}
                _currentDayMap = null;
            }
        }

        // Before-mode countdown (Plan 19-08 — NARR-01 / D-16)
        function _stopCountdown() {
            if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null; }
        }

        function _startCountdown(targetIso, hostEl) {
            _stopCountdown();
            if (!hostEl) return;
            var targetTs = Date.parse(targetIso + 'T00:00:00+10:00');
            if (isNaN(targetTs)) return;

            function tick() {
                var now = Date.now();
                var deltaMs = targetTs - now;
                if (deltaMs <= 0) {
                    _stopCountdown();
                    // Transition: re-render homepage; detectMode will now return 'live'.
                    renderHomepage();
                    return;
                }
                var totalSec = Math.floor(deltaMs / 1000);
                var days  = Math.floor(totalSec / 86400);
                var hours = Math.floor((totalSec % 86400) / 3600);
                var mins  = Math.floor((totalSec % 3600) / 60);
                var secs  = totalSec % 60;
                hostEl.innerHTML =
                    '<div class="countdown-tile"><div class="cd-value">' + days  + '</div><div class="cd-label">Days</div></div>' +
                    '<div class="countdown-tile"><div class="cd-value">' + hours + '</div><div class="cd-label">Hours</div></div>' +
                    '<div class="countdown-tile"><div class="cd-value">' + mins  + '</div><div class="cd-label">Minutes</div></div>' +
                    '<div class="countdown-tile"><div class="cd-value">' + secs  + '</div><div class="cd-label">Seconds</div></div>';
            }
            tick();
            _countdownTimer = setInterval(tick, 1000);
        }

        function _rallyTotals(events, fuel, route, agenda) {
            var totals = {
                km: 0,
                eventCount: (events || []).length,
                fuelLitres: 0,
                driverCount: 0,
                dayCount: (agenda && agenda.days) ? agenda.days.length : 0,
                startDate: agenda && agenda.rally ? agenda.rally.start_date : null,
                endDate:   agenda && agenda.rally ? agenda.rally.end_date   : null
            };
            if (route && route.days) {
                Object.keys(route.days).forEach(function(date) {
                    var pts = route.days[date].points;
                    if (!pts || pts.length < 2) return;
                    for (var i = 1; i < pts.length; i++) {
                        totals.km += _haversineKm(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1]);
                    }
                });
            }
            (fuel || []).forEach(function(f) {
                if (f.volume_litres != null) totals.fuelLitres += f.volume_litres;
            });
            // events.json carries no driver field; driver-stats.json is the authoritative list.
            totals.driverCount = (driverStatsData && driverStatsData.drivers) ? driverStatsData.drivers.length : 0;
            return totals;
        }

        function refreshLiveData() {
            // Re-fetch the data sources that change during a live rally.
            var p = [
                fetch('/captures/events.json',       { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
                fetch('/captures/notes.json',        { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
                fetch('/captures/fuel.json',         { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
                fetch('/captures/route.json',        { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
                fetch('/captures/driver-stats.json', { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
                fetch('/captures/breakdowns.json',   { cache: 'no-cache' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
            ];
            return Promise.all(p).then(function(results) {

                if (results[4] != null) driverStatsData  = results[4];
                if (results[5] != null) breakdownsData   = results[5];

                if (window.location.pathname === '/' || window.location.pathname === '') {

        // Scroll a day-spine event card into view and flash it — used by map markers.
        function _scrollToEventCard(anchorId) {
            var card = document.getElementById(anchorId);
            if (!card) return;
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.remove('spine-card-flash');
            // Force reflow so re-adding the class restarts the animation on repeat clicks.
            void card.offsetWidth;
            card.classList.add('spine-card-flash');
        }

        function initDayMap(dayISO, route, events) {
            _teardownDayMap();
            var host = document.getElementById('day-map');
            if (!host) return;

            var slice = (route && route.days && route.days[dayISO]) || null;
            var hasBackdrop = route && route.days && Object.keys(route.days).length > 0;
            var hasSlice = !!(slice && slice.points && slice.points.length > 0);

            // Event pins for this day only — computed up front so they can drive the
            // framing. route.json is frequently missing days (post-rally cache wipe),
            // so events are usually the only per-day geometry we have to zoom to.
            var dayEvents = (events || []).filter(function(ev) {
                return _dayOf(ev.timestamp) === dayISO && ev.lat != null && ev.lng != null;
            });

            // No data at all — render the muted placeholder.
            if (!hasSlice && !hasBackdrop && dayEvents.length === 0) {
                host.className = 'day-map-empty';
                host.textContent = 'No route recorded for this day yet.';
                return;
            }

            // We have SOME data. Rebuild the host as a map container.
            host.className = 'day-map-container';
            host.textContent = '';

            // Provisional centre so the map can mount. fitBounds below reframes it to
            // the day's actual action (route + event pins). Prefer day slice midpoint,
            // then first event, then rally centroid.
            var centreLat, centreLng, initialZoom;
            if (hasSlice) {
                var mid = slice.points[Math.floor(slice.points.length / 2)];
                centreLat = mid[0]; centreLng = mid[1]; initialZoom = 10;
            } else if (dayEvents.length > 0) {
                centreLat = dayEvents[0].lat; centreLng = dayEvents[0].lng; initialZoom = 11;
            } else {
                var firstDay = Object.keys(route.days)[0];
                var fp = route.days[firstDay].points[0];
                centreLat = fp[0]; centreLng = fp[1]; initialZoom = 8;
            }

            _currentDayMap = L.map('day-map', { zoomControl: true, attributionControl: true })
                .setView([centreLat, centreLng], initialZoom);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd', maxZoom: 19
            }).addTo(_currentDayMap);

            // Backdrop: all OTHER days in muted grey.
            (hasBackdrop ? Object.keys(route.days) : []).forEach(function(otherDate) {
                if (otherDate === dayISO) return;
                var pts = route.days[otherDate].points;
                if (pts && pts.length > 1) {
                    L.polyline(pts, {
                        color: '#484f58',
                        weight: 3,
                        opacity: 0.55,
                        interactive: false
                    }).addTo(_currentDayMap);
                }
            });

            // Accumulate everything that should be in frame: the day's route line and
            // its event pins. We fit to this at the end so the map always frames the
            // day's action, even when route.json has no slice for this day.
            var frameBounds = L.latLngBounds([]);

            // Day slice: bright orange on top.
            if (hasSlice && slice.points.length > 1) {
                var line = L.polyline(slice.points, {
                    color: '#e0a040',
                    weight: 5,
                    opacity: 0.95
                }).addTo(_currentDayMap);
                frameBounds.extend(line.getBounds());
            }

            // Event pins for this day only.
            dayEvents.forEach(function(ev) {
                var colour = BADGE_COLORS[ev.type] || '#8b949e';
                var anchorId = _eventAnchorId(ev);
                var marker = L.circleMarker([ev.lat, ev.lng], {
                    radius: 6,
                    color: '#0d1117',
                    weight: 1,
                    fillColor: colour,
                    fillOpacity: 0.9
                }).addTo(_currentDayMap);
                marker.bindTooltip(
                    escapeHtml(ev.type || 'EVENT') + ' · ' + _formatSpineTime(ev.timestamp),
                    { direction: 'top', offset: [0, -6] }
                );
                // Clicking a marker jumps to the event's card in the day spine below.
                marker.on('click', function() { _scrollToEventCard(anchorId); });
                frameBounds.extend([ev.lat, ev.lng]);
            });

            // Frame the day's action. maxZoom stops a single event (zero-size bounds)
            // from snapping to street level; padding keeps pins off the edge.
            if (frameBounds.isValid()) {
                _currentDayMap.fitBounds(frameBounds, { padding: [30, 30], maxZoom: 14 });
            }

            // Safety: invalidate size after a tick so Leaflet measures correctly inside a newly-mounted SPA div.
            setTimeout(function() {
                if (_currentDayMap) _currentDayMap.invalidateSize();
            }, 100);
        }

        // Day-nav progress bar (Plan 19-04)
        function _formatShortDate(iso) {

            var d = new Date(Date.UTC(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10)));
            if (isNaN(d.getTime())) return iso;
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', timeZone: 'UTC' });
        }

        // Day page scaffold (Plan 19-05 — replaces 19-03 stub).
        // Minimal dependency-free markdown renderer for the per-day blog.
        // Input is author-trusted (we upload it) but still HTML-escaped first,
        // and URLs restricted to http/https/relative/mailto.
        function renderMarkdown(src) {
            function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
            function safeUrl(u) { u = u.trim(); return /^(https?:\/\/|\/|#|mailto:)/i.test(u) ? u : '#'; }
            function inline(s) {
                s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(_, a, u) { return '<img src="' + safeUrl(u) + '" alt="' + a + '" loading="lazy">'; });
                s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, u) { return '<a href="' + safeUrl(u) + '" target="_blank" rel="noopener">' + t + '</a>'; });
                s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
                s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
                return s;
            }
            var lines = src.replace(/\r\n?/g, '\n').split('\n');
            var out = [], i = 0;
            while (i < lines.length) {
                var line = lines[i];
                if (/^```/.test(line)) {
                    var c = []; i++;
                    while (i < lines.length && !/^```/.test(lines[i])) { c.push(lines[i]); i++; }
                    i++; out.push('<pre><code>' + esc(c.join('\n')) + '</code></pre>'); continue;
                }
                var h = line.match(/^(#{1,4})\s+(.*)$/);
                if (h) { var lvl = Math.min(h[1].length + 1, 5); out.push('<h' + lvl + '>' + inline(esc(h[2])) + '</h' + lvl + '>'); i++; continue; }
                if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) { out.push('<hr>'); i++; continue; }
                if (/^>\s?/.test(line)) {
                    var q = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) { q.push(lines[i].replace(/^>\s?/, '')); i++; }
                    out.push('<blockquote>' + inline(esc(q.join(' '))) + '</blockquote>'); continue;
                }
                if (/^\s*[-*+]\s+/.test(line)) {
                    var ul = [];
                    while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) { ul.push('<li>' + inline(esc(lines[i].replace(/^\s*[-*+]\s+/, ''))) + '</li>'); i++; }
                    out.push('<ul>' + ul.join('') + '</ul>'); continue;
                }
                if (/^\s*\d+\.\s+/.test(line)) {
                    var ol = [];
                    while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { ol.push('<li>' + inline(esc(lines[i].replace(/^\s*\d+\.\s+/, ''))) + '</li>'); i++; }
                    out.push('<ol>' + ol.join('') + '</ol>'); continue;
                }
                if (/^\s*$/.test(line)) { i++; continue; }
                var para = [];
                while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,4}\s|>\s?|```|\s*[-*+]\s+|\s*\d+\.\s+|\s*(---+|\*\*\*+|___+)\s*$)/.test(lines[i])) { para.push(lines[i]); i++; }
                out.push('<p>' + inline(esc(para.join(' '))) + '</p>');
            }
            return out.join('\n');
        }

            var statsHtml =
                '<section class="day-stats">' +

        function populateDayVideos(dayISO, events) {
            var host = document.getElementById('day-videos');
            if (!host) return;
            var dayVids = (events || []).filter(function(ev) {
                return _dayOf(ev.timestamp) === dayISO &&
                       (ev.video_url || ev.video_path);
            });
            if (dayVids.length === 0) {
                host.parentElement.style.display = 'none';
                return;
            }
            var html = '<div class="video-grid">';
            dayVids.forEach(function(ev) {
                var src = ev.video_url || '/captures/' + ev.video_path;
                var colour = BADGE_COLORS[ev.type] || '#8b949e';
                var type = escapeHtml(ev.type || 'EVENT');
                var time = _formatSpineTime(ev.timestamp);
                var metaBits = [];
                if (ev.peak_g != null)         metaBits.push(Number(ev.peak_g).toFixed(2) + ' g');
                if (ev.peak_speed_kmh != null) metaBits.push(Number(ev.peak_speed_kmh).toFixed(0) + ' km/h');
                if (ev.duration_ms != null)    metaBits.push((Number(ev.duration_ms)/1000).toFixed(1) + ' s');
                html += '<div class="video-card">'
                     +    '<video controls preload="metadata" playsinline src="' + escapeHtml(src) + '"></video>'
                     +    '<div class="video-card-meta">'
                     +      '<span class="video-card-badge" style="background:' + colour + ';">' + type + '</span>'
                     +      '<span class="video-card-time">' + escapeHtml(time) + '</span>'
                     +      (metaBits.length ? '<span>' + escapeHtml(metaBits.join(' \u00b7 ')) + '</span>' : '')
                     +    '</div>'
                     +  '</div>';
            });
            html += '</div>';
            host.innerHTML = html;
        }

        function populateDayTimelapse(dayISO) {
            var section = document.getElementById('day-timelapse-section');
            var host = document.getElementById('day-timelapse');
            if (!host || !section) return;
            var src = '/captures/' + dayISO + '/timelapse.mp4';
            var poster = '/captures/' + dayISO + '/timelapse-poster.jpg';
            // HEAD request to check if the file exists before embedding
            var xhr = new XMLHttpRequest();
            xhr.open('HEAD', src, true);
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    host.innerHTML = '<div class="timelapse-player">'
                        + '<video controls preload="metadata" playsinline poster="' + escapeHtml(poster) + '" src="' + escapeHtml(src) + '"></video>'
                        + '</div>';
                } else {
                    section.style.display = 'none';
                }
            };
            xhr.onerror = function() { section.style.display = 'none'; };
            xhr.send();
        }

        // Live-mode homepage renderer (Plan 19-09 — NARR-01 / D-17 / D-08)
        function renderHomepageLive() {
            var today = new Date().toLocaleDateString('en-CA', { timeZone: TIMEZONE });

            // Guard: if 'today' is outside the rally window, fall through to archive.
            if (agendaData && agendaData.rally) {
                var start = agendaData.rally.start_date;
                var end   = agendaData.rally.end_date;
                if (end && today > end) {
                    // We've overshot into archive territory; fall back.
                    if (typeof renderHomepageArchive === 'function') { renderHomepageArchive(); return; }
                }
                if (start && today < start) {
                    // Underflow — before mode. (detectMode should already have caught this; guard anyway.)
                    renderHomepageBefore(agendaData);
                    return;
                }
            }

            // 1. Render the day-page for today (which handles day-nav, agenda, stats, spine, map).
            renderDayPage(today);

            // 2. Prepend the current-driver widget by inserting it above .day-page content.
            var widgetHtml = renderCurrentDriverWidget(driverStatsData);
            if (widgetHtml) {
                var host = document.getElementById('dynamic-route');
                var dayPage = host && host.querySelector('.day-page');
                if (dayPage) {
                    var wrapper = document.createElement('div');
                    wrapper.innerHTML = widgetHtml;
                    dayPage.insertBefore(wrapper.firstChild, dayPage.firstChild);
                }
            }

            // 3. Inject a pulsing LIVE badge into the day-header h1.
            var headerH1 = document.querySelector('.day-page .day-header h1');
            if (headerH1 && !headerH1.querySelector('.live-badge')) {
                var badge = document.createElement('span');
                badge.className = 'live-badge';
                badge.textContent = 'LIVE';
                headerH1.appendChild(badge);
            }

            // 3a. Surface route data freshness so viewers can judge for themselves
            //     during long no-signal stretches (unsealed sections, overnight stops).
            var lastUpdate = formatLastUpdate(routeData && routeData.generated_at);
            if (lastUpdate) {
                var subtitle = document.querySelector('.day-page .day-header .day-subtitle');
                if (subtitle && !subtitle.querySelector('.live-last-update')) {
                    var span = document.createElement('span');
                    span.className = 'live-last-update';
                    span.textContent = 'Last update: ' + lastUpdate;
                    if (subtitle.textContent.trim()) {
                        subtitle.appendChild(document.createTextNode(' · '));
                    }
                    subtitle.appendChild(span);
                }
            }

            // 4. Start the auto-refresh loop.
            _stopLiveRefresh();
            _liveRefreshTimer = setInterval(refreshLiveData, LIVE_REFRESH_MS);
        }

        function renderHomepage() {
            _teardownDayMap();
            _stopCountdown();
            _stopLiveRefresh();
            renderDayNav(agendaData, null);

            var mode = detectMode(agendaData);

            if (!agendaData) {
                showRoute('<div class="day-page"><section class="day-header"><h1>Shit of Theseus</h1><div class="day-subtitle">Agenda loading\u2026</div></section></div>');
                return;
            }

            if (mode === 'before') {
                renderHomepageBefore(agendaData);
                return;
            }
            if (mode === 'live') {
                renderHomepageLive();
                return;
            }
            if (mode === 'archive' || mode === 'unknown') { renderHomepageArchive(); return; }

            // Defensive fallback — should never hit.
            renderHomepageArchive();
        }

                            '<div class="build-date">Jun 2026</div>' +
                            '<div class="build-title">Front camera retune and cabin camera swap</div>' +
                            '<div class="build-desc">Front camera was crushing the road into murk under any backlit sky, because auto-exposure was metering against a blown-out windscreen. Switched to Shutter Priority with a capped 10 ms exposure so the highlights physically can\'t run away, and lifted gamma to recover the shadows that the cap leaves behind. Cabin Logitech Brio 100 (58&deg; FOV) swapped for a UGREEN CM678 (85&deg; FOV) &mdash; same 640x480 MJPEG, same encode load, but the whole cabin actually fits in frame now. Audio moves with it to the UGREEN&rsquo;s built-in mic.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Jun 2026</div>' +
                            '<div class="build-title">Auto-zero retirement and brake retune</div>' +
                            '<div class="build-desc">The stationary IMU auto-zero had drifted the persisted forward-axis offset to -0.30g, which was permanently pulling the car-frame toward &ldquo;braking&rdquo; and firing the hard-brake detector on normal urban stops. Disabled auto-zero, wiped the persisted offsets so the sampler falls back to the config seeds, and bumped the hard-brake threshold from -0.35g to -0.50g. The car is sitting straight again and the brake events look like actual braking.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Jun 2026</div>' +
                            '<div class="build-title">IMU axis convention overhaul</div>' +
                            '<div class="build-desc">Months of dashboard G-ball weirdness traced back to the LSM6DSOX being mounted with its chip Y-axis pointing rearward. Reconciled the convention across the sampler, SQLite storage path, SSE stream, and detector so that &ldquo;right&rdquo; means right and &ldquo;forward&rdquo; means forward everywhere. Took five commits to land cleanly because every layer had its own opinion about what the axes meant.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Jun 2026</div>' +
                            '<div class="build-title">Sensor cluster v3</div>' +
                            '<div class="build-desc">3&times;3 grid redesign. The earlier 4&times;2 grid was running out of real estate as the bill of materials grew, and the lid had no clean way to break out four wheel sensors plus three temperature probes without bird-nesting. The new lid uses split WAGO 221 saddles with a front-exit cable channel. Printed clear so we can see which device has died without pulling the cluster off the ceiling.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Jun 2026</div>' +
                            '<div class="build-title">Pi case v2</div>' +
                            '<div class="build-desc">Three-piece print (bottom + top + roof) replacing the original monolithic enclosure. Hinged top so the perma-proto board is reachable without unbolting anything. GX12 cutouts moved to the back wall so the loom stops fighting the air intake. The roof gets the active cooler with proper airflow geometry instead of a fan blowing into a wall.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">Cabin/front video sync</div>' +
                            '<div class="build-desc">Five debugging sessions to align the cabin picture-in-picture overlay with the front camera in rendered event clips. The Brio 100\'s 15fps stream drifts ~2 seconds against the ELP\'s H.264 stream after eight minutes, and ffmpeg\'s <code>-itsoffset</code> shifts audio as well as video. Landed on filter-level <code>setpts</code> on the video stream only, with a 2.5-second cabin pipeline latency compensation. Honest five-session debug, not a fashionable one-shot story.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">Cabin audio</div>' +
                            '<div class="build-desc">Retired the Blue Snowball, switched cabin audio to the Logitech Brio 100\'s built-in mic, and added a 200 Hz highpass to the render audio chain to suppress USB EMI from the camera\'s own bus. The raw segments still contain the EMI, only the rendered clips are clean. Good enough.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">Manual capture button (dashboard)</div>' +
                            '<div class="build-desc">A second way to trigger an event capture that doesn\'t involve reaching for the big red button. Useful when the passenger spots something interesting but the driver shouldn\'t be hunting for a switch.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">Pi 5 performance pass</div>' +
                            '<div class="build-desc">Idle load average down from 5.7 to ~1.8 after dropping cabin PiP resolution from 720p to 480p, slowing the SSE fast stream from 10 Hz to 5 Hz, killing a 60fps requestAnimationFrame loop in the G-gauge canvas, and dropping the button poll rate from 100 Hz to 10 Hz. vdd_core current fell 55%. None of these were the headline feature; together they bought enough thermal margin to actually trust the car in the summer.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">GPS clock sync and RTC writeback</div>' +
                            '<div class="build-desc">The Pi 5 has no battery on its RTC pads, so the system clock drifts across power cuts. Wired up GPS-driven clock correction at boot, calling <code>hwclock --systohc</code> after the system clock catches up so the RTC is at least correct for the next warm start. The GPS backup battery gives a warm fix in seconds, which closes most of the gap. A CR2032 on the RTC pads is the proper fix; that\'s a pre-rally nice-to-have.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">May 2026</div>' +
                            '<div class="build-title">Boot reliability</div>' +
                            '<div class="build-desc">A pile of headless-boot fixes so the car comes up reliably from cold without anyone touching it. <code>kiosk.service</code> ordering cycle resolved by switching from <code>multi-user.target</code> to <code>graphical.target</code>; X-readiness wait added before launching Chromium so it stops crashing in a restart loop; <code>hdmi_force_hotplug=1</code> so the Pi boots without a powered display; WiFi disabled at the firmware level. Boot time finally dropped from 53s to 6s after masking <code>NetworkManager-wait-online.service</code>, which had been sitting on the boot waiting for an interface that doesn\'t exist.</div>' +
                        '</div>' +
                        '<div class="build-entry">' +
                            '<div class="build-date">Apr 2026</div>' +
                            '<div class="build-title">TPMS Integration</div>' +
                            '<div class="build-desc">Four 433 MHz tyre pressure sensors decoded by a USB RTL-SDR dongle running rtl_433. Per-wheel PSI lands on the dashboard Health page, SQLite, and Grafana, plus TTS alerts for sustained low pressure and a separate fast-deflation leak warning. The decoder\'s pressure maths was off by a factor of 2.45, caught with a stick gauge on the bench and fixed with one correction in the collector. Adds &ldquo;tyre leaking, rear passenger&rdquo; to the list of things the Pi can shout at us mid-drive.</div>' +

                            '<div class="build-desc">Every sensor is now declared in a manifest with a per-device health state machine, backoff ladder, and TTS announcements. The OLED rolls up missing devices; the dashboard kiosk has a floating HW panel. The Pi tells you what\'s broken instead of silently running on garbage data.</div>' +
