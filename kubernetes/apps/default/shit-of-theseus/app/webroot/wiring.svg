  <a href="#hw-gps" target="_parent">
    <rect x="682" y="310" width="170" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="767" y="330" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">GPS Module</text>
    <text x="767" y="344" text-anchor="middle" fill="#8b949e" font-size="9">gpsd · 1 Hz · USB serial</text>
  </a>

  <!-- Display (touch USB) -->
  <a href="#hw-display" target="_parent">
    <rect x="682" y="370" width="170" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="767" y="390" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Waveshare 7" Touch</text>
    <text x="767" y="404" text-anchor="middle" fill="#8b949e" font-size="9">USB (touch input)</text>
  </a>

  <!-- ===== HDMI (top right) ===== -->
  <text x="700" y="80" text-anchor="middle" fill="#8957e5" font-size="11" font-weight="600">HDMI</text>

  <!-- Display HDMI -->
  <a href="#hw-display" target="_parent">
    <rect x="630" y="90" width="140" height="44" rx="6" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
    <text x="700" y="110" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Waveshare 7"</text>
    <text x="700" y="124" text-anchor="middle" fill="#8b949e" font-size="9">1024×600 · kiosk dashboard</text>
  </a>
  <path d="M500,240 L500,112 L630,112" fill="none" stroke="#8957e5" stroke-width="1.5"/>

  <!-- ===== GPIO (bottom centre) ===== -->
  <text x="450" y="410" text-anchor="middle" fill="#e0a040" font-size="11" font-weight="600">GPIO</text>

  <!-- Button -->
  <a href="#hw-button" target="_parent">
    <rect x="370" y="426" width="160" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="450" y="446" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Big Red Button</text>
    <text x="450" y="460" text-anchor="middle" fill="#8b949e" font-size="9">GPIO 17 · 50ms debounce</text>
  </a>
  <line x1="450" y1="360" x2="450" y2="426" stroke="#e0a040" stroke-width="1.5"/>

  <!-- ===== Network (bottom right) ===== -->
  <text x="720" y="490" text-anchor="middle" fill="#6e7681" font-size="11" font-weight="600">Network</text>

  <!-- GL.iNet -->
  <rect x="630" y="506" width="160" height="48" rx="6" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="710" y="526" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">GL-BE3600</text>
  <text x="710" y="542" text-anchor="middle" fill="#8b949e" font-size="9">Ethernet from Pi · WireGuard</text>

  <!-- Ethernet line from Pi to GL.iNet -->
  <path d="M520,360 L520,530 L630,530" fill="none" stroke="#6e7681" stroke-width="1.5"/>

  <!-- Hotspot -->
  <rect x="630" y="570" width="160" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
  <text x="710" y="590" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Portable Hotspot</text>
  <text x="710" y="604" text-anchor="middle" fill="#8b949e" font-size="9">External antenna · 4G</text>
  <path d="M710,554 L710,570" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Upstream label -->
  <text x="710" y="634" text-anchor="middle" fill="#6e7681" font-size="9">→ Prometheus remote_write · rsync to NAS</text>

  <!-- ===== Sensor cluster housing (bottom left) ===== -->
  <a href="#hw-cluster" target="_parent">
    <rect x="28" y="590" width="280" height="60" rx="8" fill="#161b22" stroke="#2a1f0e" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="168" y="614" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">Sensor Cluster Housing</text>
    <text x="168" y="630" text-anchor="middle" fill="#6e7681" font-size="9">3D-printed PETG · ceiling mount · 4×2 grid</text>
    <text x="168" y="642" text-anchor="middle" fill="#6e7681" font-size="9">LSM6DSOX · LIS3MDL · BME690 · VEML7700 · SEN0460</text>
  </a>

  <!-- ===== Legend (bottom left, below sensor cluster) ===== -->
  <rect x="28" y="670" width="340" height="70" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <line x1="44" y1="692" x2="70" y2="692" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="78" y="696" fill="#8b949e" font-size="9">I2C (SDA/SCL)</text>
  <line x1="44" y1="708" x2="70" y2="708" stroke="#2ea043" stroke-width="1.5"/>
  <text x="78" y="712" fill="#8b949e" font-size="9">USB</text>
  <line x1="44" y1="724" x2="70" y2="724" stroke="#8957e5" stroke-width="1.5"/>
  <text x="78" y="728" fill="#8b949e" font-size="9">HDMI</text>
  <line x1="180" y1="692" x2="206" y2="692" stroke="#e0a040" stroke-width="1.5"/>
  <text x="214" y="696" fill="#8b949e" font-size="9">GPIO</text>
  <line x1="180" y1="708" x2="206" y2="708" stroke="#6e7681" stroke-width="1.5"/>
  <text x="214" y="712" fill="#8b949e" font-size="9">Ethernet</text>
  <line x1="180" y1="724" x2="206" y2="724" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="214" y="728" fill="#8b949e" font-size="9">Wireless (4G)</text>
</svg>
