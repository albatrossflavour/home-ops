<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 940 760" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    a:hover rect { stroke-width: 2; }
    a { cursor: pointer; }
  </style>

  <!-- Background -->
  <rect width="940" height="760" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="470" y="36" text-anchor="middle" fill="#f0dbb8" font-size="16" font-weight="600">V2 Telemetry Wiring — Shit of Theseus</text>

  <!-- ===== PI 5 (centre) ===== -->
  <rect x="340" y="240" width="220" height="120" rx="8" fill="#161b22" stroke="#c06000" stroke-width="2"/>
  <text x="450" y="272" text-anchor="middle" fill="#c06000" font-size="14" font-weight="700">Raspberry Pi 5</text>
  <text x="450" y="292" text-anchor="middle" fill="#8b949e" font-size="10">Proto Board HAT</text>
  <text x="450" y="310" text-anchor="middle" fill="#8b949e" font-size="10">NVMe SSD (via HAT)</text>
  <text x="450" y="328" text-anchor="middle" fill="#8b949e" font-size="10">/var/lib/shitbox → SQLite + captures</text>
  <text x="450" y="346" text-anchor="middle" fill="#6e7681" font-size="9">shitbox-telemetry.service</text>

  <!-- ===== I2C BUS (left column) ===== -->
  <text x="148" y="74" text-anchor="middle" fill="#1f6feb" font-size="11" font-weight="600">I2C Bus (bus 1)</text>

  <!-- TCA4307 buffer -->
  <rect x="78" y="86" width="140" height="40" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="148" y="103" text-anchor="middle" fill="#1f6feb" font-size="10" font-weight="600">TCA4307</text>
  <text x="148" y="117" text-anchor="middle" fill="#8b949e" font-size="9">I2C bus buffer</text>

  <!-- Line from Pi to TCA4307 -->
  <path d="M340,280 L240,280 L240,126 L218,126" fill="none" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="252" y="200" fill="#1f6feb" font-size="8" transform="rotate(-90,252,200)">SDA/SCL</text>

  <!-- LSM6DSOX -->
  <a href="#hw-lsm6dsox" target="_parent">
    <rect x="28" y="150" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="170" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">LSM6DSOX</text>
    <text x="98" y="184" text-anchor="middle" fill="#8b949e" font-size="9">Accel + Gyro · 50 Hz</text>
  </a>
  <line x1="148" y1="126" x2="148" y2="150" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- LIS3MDL -->
  <a href="#hw-lis3mdl" target="_parent">
    <rect x="28" y="210" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="230" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">LIS3MDL</text>
    <text x="98" y="244" text-anchor="middle" fill="#8b949e" font-size="9">Magnetometer</text>
  </a>
  <line x1="98" y1="194" x2="98" y2="210" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- BME690 -->
  <a href="#hw-bme690" target="_parent">
    <rect x="28" y="270" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="290" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">BME690</text>
    <text x="98" y="304" text-anchor="middle" fill="#8b949e" font-size="9">Temp / Humidity / VOC</text>
  </a>
  <line x1="98" y1="254" x2="98" y2="270" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- INA226 -->
  <a href="#hw-ina226" target="_parent">
    <rect x="28" y="330" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="350" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">INA226</text>
    <text x="98" y="364" text-anchor="middle" fill="#8b949e" font-size="9">Power monitor</text>
  </a>
  <line x1="98" y1="314" x2="98" y2="330" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- VEML7700 -->
  <a href="#hw-veml7700" target="_parent">
    <rect x="28" y="390" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="410" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">VEML7700</text>
    <text x="98" y="424" text-anchor="middle" fill="#8b949e" font-size="9">Ambient light</text>
  </a>
  <line x1="98" y1="374" x2="98" y2="390" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- SEN0460 PM2.5 -->
  <a href="#hw-sen0460" target="_parent">
    <rect x="28" y="450" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="470" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">SEN0460 PM2.5</text>
    <text x="98" y="484" text-anchor="middle" fill="#8b949e" font-size="9">I2C 0x19 · air quality</text>
  </a>
  <line x1="98" y1="434" x2="98" y2="450" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- Piezo buzzer -->
  <a href="#hw-buzzer" target="_parent">
    <rect x="28" y="510" width="140" height="44" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="98" y="530" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Piezo Buzzer</text>
    <text x="98" y="544" text-anchor="middle" fill="#8b949e" font-size="9">I2C 0x5C · capture chirp</text>
  </a>
  <line x1="98" y1="494" x2="98" y2="510" stroke="#1f6feb" stroke-width="1.5"/>

  <!-- Qwiic chain label -->
  <text x="18" y="155" fill="#1f6feb" font-size="8" transform="rotate(-90,18,260)">Qwiic chain (daisy-chained)</text>

  <!-- ===== USB (right column) ===== -->
  <text x="762" y="154" text-anchor="middle" fill="#2ea043" font-size="11" font-weight="600">USB</text>

  <!-- Front camera -->
  <a href="#hw-cameras" target="_parent">
    <rect x="682" y="168" width="170" height="52" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="767" y="188" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">ELP USB1080P03-BH100 (Front)</text>
    <text x="767" y="202" text-anchor="middle" fill="#8b949e" font-size="9">/dev/camera-front · audio</text>
    <text x="767" y="214" text-anchor="middle" fill="#da3633" font-size="8">PiP primary</text>
  </a>

  <!-- Cabin camera -->
  <a href="#hw-cameras" target="_parent">
    <rect x="682" y="234" width="170" height="52" rx="6" fill="#161b22" stroke="#2a1f0e" stroke-width="1"/>
    <text x="767" y="254" text-anchor="middle" fill="#f0dbb8" font-size="10" font-weight="600">Brio 100 (Cabin)</text>
    <text x="767" y="268" text-anchor="middle" fill="#8b949e" font-size="9">/dev/camera-cabin · video only</text>
    <text x="767" y="280" text-anchor="middle" fill="#d29922" font-size="8">PiP overlay</text>
  </a>

  <!-- USB bus trunk -->
  <path d="M560,290 L630,290" fill="none" stroke="#2ea043" stroke-width="1.5"/>
  <line x1="630" y1="194" x2="630" y2="392" stroke="#2ea043" stroke-width="1.5"/>
  <line x1="630" y1="194" x2="682" y2="194" stroke="#2ea043" stroke-width="1.5"/>
  <line x1="630" y1="260" x2="682" y2="260" stroke="#2ea043" stroke-width="1.5"/>
  <line x1="630" y1="332" x2="682" y2="332" stroke="#2ea043" stroke-width="1.5"/>
  <line x1="630" y1="392" x2="682" y2="392" stroke="#2ea043" stroke-width="1.5"/>

