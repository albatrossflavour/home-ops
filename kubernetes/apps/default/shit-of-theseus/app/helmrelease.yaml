# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app shit-of-theseus
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      shit-of-theseus:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: nginx
              tag: "1.30-alpine@sha256:5f979dcfed4ce6461873f087e8c980d6e29b084b9e8776d9704a7e989b5f4898"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
          donation-exporter:
            image:
              repository: python
              tag: "3.14-alpine@sha256:dd4d2bd5b53d9b25a51da13addf2be586beebd5387e289e798e4083d94ca837a"
            command:
              - sh
              - -c
              - |
                pip install --no-cache-dir requests prometheus-client && \
                python /scripts/donation_exporter.py
            env:
              DONATION_URL: "https://autumn2026.shitboxrally.com.au/a-team-has-no-name"
              OUTPUT_PATH: "/shared/donation.json"
              POLL_INTERVAL: "300"
              METRICS_PORT: "8000"
            ports:
              - name: metrics
                containerPort: 8000
            resources:
              requests:
                cpu: 5m
                memory: 48Mi
              limits:
                memory: 96Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 80
          metrics:
            port: 8000
            targetPort: 8000
    ingress:
      app:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hosts:
          - host: shit-of-theseus.com
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
    persistence:
      webroot:
        type: configMap
        name: shit-of-theseus-webroot
        advancedMounts:
          shit-of-theseus:
            app:
              - path: /usr/share/nginx/html
      nginx-config:
        type: configMap
        name: shit-of-theseus-nginx-config
        advancedMounts:
          shit-of-theseus:
            app:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
      captures:
        type: nfs
        server: 192.168.1.22
        path: /volume2/apps/shitbox
        advancedMounts:
          shit-of-theseus:
            app:
              - path: /usr/share/nginx/html/captures
                readOnly: true
      build:
        type: nfs
        server: 192.168.1.22
        path: /volume2/apps/shitbox/build
        advancedMounts:
          shit-of-theseus:
            app:
              - path: /usr/share/nginx/html/build
                readOnly: true
      donation-data:
        type: emptyDir
        advancedMounts:
          shit-of-theseus:
            app:
              - path: /shared
                readOnly: true
            donation-exporter:
              - path: /shared
      donation-script:
        type: configMap
        name: shit-of-theseus-donation-exporter
        advancedMounts:
          shit-of-theseus:
            donation-exporter:
              - path: /scripts/donation_exporter.py
                subPath: donation_exporter.py
