server {
    listen 80;
    server_name shit-of-theseus.com;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/captures/(events|timelapse|notes|fuel|breakdowns|driver-stats|route)\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Per-day blog markdown — served as text, no-cache so edits show promptly.
    location ~ ^/captures/blog/.*\.md$ {
        default_type text/markdown;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /captures/ {
        autoindex on;
        autoindex_format json;
        types { video/mp4 mp4; }
        # Captures are immutable once created (a day is compiled once), so edge
        # caching is desirable — Cloudflare serves the videos from its edge. If a
        # file is ever rewritten in place, purge that URL from Cloudflare.
        add_header Cache-Control "public, max-age=86400";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /agenda.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Donation tracker — written to a shared emptyDir by the
    # donation-exporter sidecar. Cache short so the SPA picks up
    # updates within a poll cycle.
    location = /donation.json {
        alias /shared/donation.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Until the first poll completes, /shared/donation.json doesn't
        # exist yet. Return an empty 204 instead of a noisy 404.
        try_files $uri =204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
