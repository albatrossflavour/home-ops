---
id: tvchaosuk-custom
name: TVChaosUK (Custom)
description: "TV Chaos UK (TVCUK) is a Private Torrent Tracker for UK TV"
language: en-GB
type: private
encoding: UTF-8
links:
  - https://tvchaosuk.com/

# NOTE: The official Prowlarr definition was removed 2026-05-18 "at the request
# of admins", and TVChaosUK's UNIT3D upgrade killed the old torrents/filter web
# scrape ("The torrent filter must now be submitted from the search form").
# This custom definition uses the UNIT3D JSON API with a Bearer token instead,
# which sidesteps the dead endpoint and the expiring-session cookie faff.

caps:
  categorymappings:
    - {id: 29, cat: TV, desc: "Comedy"}
    - {id: 45, cat: TV, desc: "Current Affairs"}
    - {id: 5, cat: TV/Documentary, desc: "Documentary"}
    - {id: 11, cat: TV, desc: "Drama"}
    - {id: 14, cat: TV, desc: "Entertainment"}
    - {id: 19, cat: TV, desc: "Factual"}
    - {id: 43, cat: TV, desc: "Foreign"}
    - {id: 32, cat: TV, desc: "Kids & Family"}
    - {id: 44, cat: Movies, desc: "Movies"}
    - {id: 54, cat: TV, desc: "News"}
    - {id: 51, cat: Audio, desc: "Radio"}
    - {id: 52, cat: TV, desc: "Reality"}
    - {id: 30, cat: TV, desc: "Soaps"}
    - {id: 33, cat: TV, desc: "Sci-Fi"}
    - {id: 42, cat: TV/Sport, desc: "Sport"}
    - {id: 53, cat: TV, desc: "Holding Bin"}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]

settings:
  - name: apikey
    type: text
    label: APIKey
  - name: info_key
    type: info
    label: About your API key
    default: "Find or generate your API Token on the <a href=\"https://tvchaosuk.com/\" target=\"_blank\">TVChaosUK</a> site under your account <i>Settings</i> / <i>Security</i> page."
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: created_at
    options:
      created_at: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  path: api/torrents
  method: get
  inputs: {}
  error:
    - selector: a[href*="/login"]
      message:
        text: "The API key was not accepted by {{ .Config.sitelink }}."
    - selector: :root:contains("Account is Banned")

search:
  paths:
    - path: api/torrents/filter
      response:
        type: json

  headers:
    Authorization: ["Bearer {{ .Config.apikey }}"]

  inputs:
    $raw: "{{ range .Categories }}&categories[]={{.}}{{end}}"
    name: "{{ .Keywords }}"
    imdbId: "{{ .Query.IMDBIDShort }}"
    tmdbId: "{{ .Query.TMDBID }}"
    tvdbId: "{{ .Query.TVDBID }}"
    "free[]": "{{ if .Config.freeleech }}100{{ else }}{{ end }}"
    sortField: "{{ .Config.sort }}"
    sortDirection: "{{ .Config.type }}"
    perPage: 100

  keywordsfilters:
    # TVChaosUK names season packs "Series 1" rather than "S01"
    - name: re_replace
      args: ["(?i)(S0)(\\d{1,2})$", "Series $2"]
    - name: re_replace
      args: ["(?i)(S)(\\d{1,3})$", "Series $2"]
    - name: re_replace
      args: ["\\.", " "]

  rows:
    selector: data
    attribute: attributes

  fields:
    category:
      selector: category_id
    title:
      selector: name
      filters:
        - name: re_replace
          args: ["(?i)Series[\\s]+(\\d+)", "S$1"]
    details:
      selector: details_link
    download:
      selector: download_link
    poster:
      selector: meta.poster
      filters:
        - name: replace
          args: ["https://via.placeholder.com/90x135", ""]
    imdbid:
      selector: imdb_id
    tmdbid:
      selector: tmdb_id
    tvdbid:
      selector: tvdb_id
    genre:
      selector: meta.genres
    description:
      text: "{{ .Result.genre }}"
    seeders:
      selector: seeders
    leechers:
      selector: leechers
    grabs:
      selector: times_completed
    date:
      selector: created_at
      filters:
        - name: append
          args: " +00:00" # GMT
        - name: dateparse
          args: "MM/dd/yyyy HH:mm:ss zzz"
    size:
      selector: size
    downloadvolumefactor:
      selector: freeleech
      case:
        0%: 1
        25%: 0.75
        50%: 0.5
        75%: 0.25
        100%: 0
        "*": 0
    uploadvolumefactor:
      selector: double_upload
      case:
        False: 1
        True: 2
    minimumratio:
      text: 0.4
    minimumseedtime:
      # 1 day (as seconds = 24 x 60 x 60)
      text: 86400
# json UNIT3D API
