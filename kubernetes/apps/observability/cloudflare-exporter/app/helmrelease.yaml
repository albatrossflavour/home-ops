---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-exporter
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      cloudflare-exporter:
        containers:
          app:
            image:
              repository: ghcr.io/lablabs/cloudflare_exporter
              tag: "0.2.3"
            env:
              TZ: "${TIMEZONE}"
              LISTEN: ":8080"
              METRICS_PATH: "/metrics"
              # Account is on Cloudflare's free plan; only request datasets
              # available to free zones or every scrape errors.
              FREE_TIER: "true"
              # Fetch cadence from the Cloudflare GraphQL API. Prometheus
              # scrapes the cached result; this is the real API-load knob.
              SCRAPE_DELAY: "300"
            envFrom:
              - secretRef:
                  name: cloudflare-exporter
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: cloudflare-exporter
        ports:
          metrics:
            protocol: HTTP
            port: 8080
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
            interval: 1m
            scrapeTimeout: 30s
